  <script>
    var currentPortal = '';
    var currentUser = '';
    var tanksRefreshInterval = null;

    function promptPassword(portal) {
      currentPortal = portal;
      const portalNames = {
        'A': 'ارسال تانك',
        'B': 'تحليل عينة',
        'TDS': 'إصدار شهادة TDS',
        'PROD': 'متابعة الإنتاج'
      };
      
      document.getElementById('passwordPortalName').textContent = 'الرجاء إدخال رمز المرور لـ ' + portalNames[portal];
      document.getElementById('homeContent').style.display = 'none';
      document.getElementById('passwordSection').style.display = 'block';
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordError').style.display = 'none';
      document.getElementById('passwordInput').focus();
    }

    function cancelPassword() {
      document.getElementById('passwordSection').style.display = 'none';
      document.getElementById('homeContent').style.display = 'block';
      currentPortal = '';
    }

    function verifyPassword() {
      const password = document.getElementById('passwordInput').value.trim();
      
      if (!password) {
        document.getElementById('passwordError').style.display = 'flex';
        return;
      }
      
      showLoading();
      
      google.script.run
        .withSuccessHandler(function(result) {
          hideLoading();
          if (result.valid) {
            currentUser = result.userName; // Set actual user name globally
            showPortal(currentPortal);
            startHeartbeat(currentPortal); // Start online tracking
          } else {
            document.getElementById('passwordError').querySelector('span').textContent = result.message || 'رمز المرور غير صحيح';
            document.getElementById('passwordError').style.display = 'flex';
          }
        })
        .withFailureHandler(function(error) { hideLoading(); alert('حدث خطأ: ' + error.message); })
        .loginUser(password, currentPortal);
    }

    var heartbeatInterval = null;

    function startHeartbeat(portal) {
      if (!currentUser) return;
      if (heartbeatInterval) clearInterval(heartbeatInterval);
      
      const portalNames = { 'A': 'ارسال تانك', 'B': 'تحليل عينة', 'TDS': 'شهادات TDS', 'PROD': 'متابعة الإنتاج', 'C': 'التقارير' };
      const locationName = portalNames[portal] || 'الرئيسية';
      
      google.script.run.updateHeartbeat(currentUser, locationName);
      
      heartbeatInterval = setInterval(function() {
        if (currentUser) {
          google.script.run.updateHeartbeat(currentUser, locationName);
        }
      }, 30000); // Ping every 30 seconds
    }

    function stopHeartbeat() {
      if (heartbeatInterval) clearInterval(heartbeatInterval);
      if (currentUser) {
         google.script.run.updateHeartbeat(currentUser, 'الرئيسية (Idle)');
      }
    }

    function showPortal(portal) {
      document.getElementById('homePage').style.display = 'none';
      const portalPage = document.getElementById('portalPage');
      portalPage.style.display = 'block';
      
      // If user is already authenticated and navigates to a public portal, track them
      if (currentUser && portal === 'C') {
         startHeartbeat('C');
      }
      
      if (portal === 'A') {
        portalPage.innerHTML = document.getElementById('portalATemplate').innerHTML;
        initPortalA();
      } else if (portal === 'B') {
        portalPage.innerHTML = document.getElementById('portalBTemplate').innerHTML;
        initPortalB();
      } else if (portal === 'C') {
        portalPage.innerHTML = document.getElementById('portalCTemplate').innerHTML;
        initPortalC();
      } else if (portal === 'TDS') {
        portalPage.innerHTML = document.getElementById('portalTDSTemplate').innerHTML;
        initPortalTDS();
      } else if (portal === 'PROD') {
        portalPage.innerHTML = document.getElementById('portalProdTemplate').innerHTML;
        initPortalProd();
      }
    }

    function goHome() {
      stopHeartbeat(); // Update location to Idle
      document.getElementById('portalPage').style.display = 'none';
      document.getElementById('portalPage').innerHTML = '';
      document.getElementById('passwordSection').style.display = 'none';
      document.getElementById('homeContent').style.display = 'block';
      document.getElementById('homePage').style.display = 'block';
      currentPortal = '';
    }

    function showLoading() {
      document.getElementById('loadingOverlay').style.display = 'flex';
    }

    function hideLoading() {
      document.getElementById('loadingOverlay').style.display = 'none';
    }

    // Dashboard Functions
    // --- ONLINE BADGES LOGIC ---
    function getColorForName(name) {
       let hash = 0;
       for (let i = 0; i < name.length; i++) {
          hash = name.charCodeAt(i) + ((hash << 5) - hash);
       }
       const colors = ['#ef4444', '#f97316', '#8b5cf6', '#10b981', '#3b82f6', '#ec4899', '#14b8a6'];
       return colors[Math.abs(hash) % colors.length];
    }

    function createBadgeNode(user, index) {
         const badge = document.createElement('div');
         badge.style.cssText = `
            width: 28px; height: 28px; border-radius: 50%; color: white; font-size: 11px; font-weight: 900;
            display: flex; align-items: center; justify-content: center; border: 2px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-right: -10px; text-transform: uppercase;
            background-color: ${getColorForName(user.name)}; z-index: ${100 - index};
         `;
         badge.title = user.name + ' (متصل الآن)';
         badge.textContent = user.initials;
         return badge;
    }

    function renderOnlineBadges(onlineUsers) {
       document.querySelectorAll('.online-badges-wrapper').forEach(el => el.remove());

       const locationMap = {
          'ارسال تانك': { btn: 'btnPortalA', header: 'badgesPortalA' },
          'تحليل عينة': { btn: 'btnPortalB', header: 'badgesPortalB' },
          'شهادات TDS': { btn: 'btnPortalTDS', header: 'badgesPortalTDS' },
          'متابعة الإنتاج': { btn: 'btnPortalPROD', header: 'badgesPortalPROD' },
          'التقارير': { btn: 'btnPortalC', header: 'badgesPortalC' }
       };

       const grouped = {};
       onlineUsers.forEach(u => {
          if (!grouped[u.location]) grouped[u.location] = [];
          grouped[u.location].push(u);
       });

       for (let loc in grouped) {
          const targets = locationMap[loc];
          if (!targets) continue;
          
          const badgeGroup = grouped[loc];

          // 1. Draw Badges on Home Buttons
          const btn = document.getElementById(targets.btn);
          if (btn) {
             const wrapper = document.createElement('div');
             wrapper.className = 'online-badges-wrapper';
             wrapper.style.cssText = 'position: absolute; top: -10px; right: -10px; display: flex; flex-direction: row-reverse; z-index: 20;';
             badgeGroup.forEach((user, index) => wrapper.appendChild(createBadgeNode(user, index)));
             btn.appendChild(wrapper);
          }

          // 2. Draw Badges inside Portal Headers
          const headerContainer = document.getElementById(targets.header);
          if (headerContainer) {
             const wrapper = document.createElement('div');
             wrapper.className = 'online-badges-wrapper';
             wrapper.style.cssText = 'display: flex; flex-direction: row-reverse; align-items: center; margin-right: 15px;';
             badgeGroup.forEach((user, index) => wrapper.appendChild(createBadgeNode(user, index)));
             headerContainer.appendChild(wrapper);
          }
       }
    }

    function fetchOnlineUsers() {
       google.script.run
         .withSuccessHandler(renderOnlineBadges)
         .getOnlineUsers();
    }

    // --- DASHBOARDS INITIALIZATION ---
    function initializeDashboards() {
      loadTanksDashboard();
      
      // Start polling for online users every 15 seconds
      fetchOnlineUsers();
      setInterval(fetchOnlineUsers, 15000); 
    }

    function resetTanksDate() {
      const datePicker = document.getElementById('tanksDatePicker');
      if (datePicker) datePicker.value = '';
      refreshTanksDashboard();
    }

    function refreshTanksDashboard() {
      const btn = event ? (event.target.closest ? event.target.closest('.btn-refresh') : null) : null;
      if (btn) btn.classList.add('rotating');
      
      loadTanksDashboard(function() {
        if (btn) btn.classList.remove('rotating');
      });
    }

    function loadTanksDashboard(callback) {
      const datePicker = document.getElementById('tanksDatePicker');
      const selectedDate = datePicker ? datePicker.value : '';
      
      // Toggle Clear Button Visibility dynamically
      const clearBtn = document.getElementById('tanksClearDateBtn');
      if (clearBtn) {
         clearBtn.style.display = selectedDate ? 'flex' : 'none';
      }
      
      // Update the Dashboard Title Dynamically
      const titleEl = document.getElementById('tanksDashboardTitle');
      if (titleEl) {
         if (selectedDate) {
             const d = new Date(selectedDate);
             titleEl.textContent = 'لوحة التانكات - ' + d.toLocaleDateString('ar-EG', { day: 'numeric', month: 'short', year: 'numeric' });
         } else {
             titleEl.textContent = 'لوحة التانكات - اليوم';
         }
      }

      const container = document.getElementById('tanksDashboardCards');
      if (container) {
         // Show loading state while fetching the new date
         container.innerHTML = '<div class="dashboard-loading"><i class="fas fa-spinner fa-spin"></i><span>جاري التحميل...</span></div>';
      }

      google.script.run
        .withSuccessHandler(function(data) {
          renderTanksDashboard(data);
          if (callback) callback();
        })
        .withFailureHandler(function(error) {
          console.error('Error loading tanks dashboard:', error);
          if (container) {
            container.innerHTML = '<div class="dashboard-loading"><i class="fas fa-exclamation-circle"></i><span>خطأ في تحميل البيانات</span></div>';
          }
          if (callback) callback();
        })
        .getTodayTanksDashboardData(selectedDate);
    }

    function showTooltipImage(event, url) {
      event.stopPropagation();
      if(!url || url.length < 5) return;
      
      const existing = document.getElementById('imgTooltip');
      if(existing) existing.remove();

      let directUrl = url;
      const idMatch = url.match(/[-\w]{25,}/);
      if (idMatch && idMatch[0]) {
        directUrl = 'https://lh3.googleusercontent.com/d/' + idMatch[0];
      }
      
      const btnRect = event.currentTarget.getBoundingClientRect();
      const tooltip = document.createElement('div');
      tooltip.id = 'imgTooltip';
      tooltip.style.position = 'fixed';
      tooltip.style.zIndex = '100000';
      tooltip.style.backgroundColor = 'white';
      tooltip.style.padding = '5px';
      tooltip.style.borderRadius = '8px';
      tooltip.style.boxShadow = '0 10px 25px rgba(0,0,0,0.2)';
      tooltip.style.border = '1px solid #e2e8f0';
      
      const imgSize = 180;
      let topPos = btnRect.top - imgSize - 15;
      if (topPos < 10) topPos = btnRect.bottom + 15;
      
      let leftPos = btnRect.left - (imgSize / 2) + (btnRect.width / 2);
      if (leftPos < 10) leftPos = 10;
      if (leftPos + imgSize > window.innerWidth - 10) leftPos = window.innerWidth - imgSize - 10;

      tooltip.style.top = topPos + 'px';
      tooltip.style.left = leftPos + 'px';
      tooltip.style.transform = 'scale(0.9)';
      tooltip.style.opacity = '0';
      tooltip.style.transition = 'all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
      
      tooltip.innerHTML = `<img src="${directUrl}" style="max-width: ${imgSize}px; max-height: ${imgSize}px; border-radius: 4px; display: block;">`;
      
      document.body.appendChild(tooltip);
      
      requestAnimationFrame(() => {
        tooltip.style.transform = 'scale(1)';
        tooltip.style.opacity = '1';
      });

      const closeTooltip = function() {
        if (tooltip && tooltip.parentNode) {
            tooltip.style.transform = 'scale(0.9)';
            tooltip.style.opacity = '0';
            setTimeout(() => tooltip.remove(), 200);
        }
        document.removeEventListener('click', closeTooltip);
      };
      
      setTimeout(() => document.addEventListener('click', closeTooltip), 50);
    }

            setTimeout(() => tooltip.remove(), 200);
        }
        document.removeEventListener('click', closeTooltip);
      };
      setTimeout(() => document.addEventListener('click', closeTooltip), 50);
    }

    function renderTanksDashboard(data) {
  const container = document.getElementById('tanksDashboardCards');
  if (!container) return;

  const ho = data.handover || {};
  const prevTank = data.prevShiftLastTank || {};

  // Build the chips HTML using standard data attributes to bypass Maestro HTML parser errors
  let chipsHTML = '';
  let maxReg = data.maxRegisteredSerial || 0;
  
  if (data.startSerial > 0 && data.endSerial >= data.startSerial) {
    for (let i = data.startSerial; i <= data.endSerial; i++) {
      let tankData = data.tanksMap ? data.tanksMap[i] : null;
      
      if (tankData) {
        let specialClass = '';
        let isMissing = false;
        
        if (!tankData.isRegistered) {
            if (i < maxReg) {
                // Rule 1: Not registered AND smaller than the highest registered tank -> Missing
                isMissing = true;
                specialClass += ' missing';
            } else {
                // Rule 4: Not registered BUT is the latest active tank -> Early Lab / In-Progress
                specialClass += ' chip-early-lab';
            }
        } else {
            if (tankData.productType && tankData.productType !== 'خل') {
                // Rule 2: Registered AND Not "خل" -> Yellow Border
                specialClass += ' chip-special';
            }
            
            if (tankData.labResult === '-') {
               // Rule 3: Recorded but NOT analyzed (no lab result) -> Glowing red border
               specialClass += ' chip-untested';
            }
        }

      } else {

      }
    }

    function navigateToTanksReport() {
      showPortal('C');
      setTimeout(function() {
        var reportBtn = document.querySelector('[onclick*="selectReportTypeC(\'tank\')"]');
        if (reportBtn) {
          reportBtn.click();
        }
      }, 800);
    }

    function navigateToSerial(serial) {
      if (serial === 0) return;
      
      showPortal('C');
      setTimeout(function() {
        var reportBtn = document.querySelector('[onclick*="selectReportTypeC(\'tank\')"]');
        if (reportBtn) {
          reportBtn.click();
          setTimeout(function() {
            var searchInput = document.getElementById('searchInput');
            if (searchInput) {
              searchInput.value = serial;
              if (typeof filterTable === 'function') {
                filterTable();
              }
            }
          }, 1000);
        }
      }, 800);
    }

    function navigateToTankConcentration(type, serial) {
      if (serial === 0) return;
      navigateToSerial(serial);
    }

    function navigateToAnalysisReport(method) {
      showPortal('C');
      setTimeout(function() {
        var reportBtn = document.querySelector('[onclick*="selectReportTypeC(\'analysis\')"]');
        if (reportBtn) {
          reportBtn.click();
          setTimeout(function() {
            var searchTerm = method === 'device' ? 'الجهاز' : 'معملي';
            var searchInput = document.getElementById('searchInput');
            if (searchInput) {
              searchInput.value = searchTerm;
              if (typeof filterTable === 'function') {
                filterTable();
              }
            }
          }, 1000);
        }
      }, 800);
    }

    function navigateToAnalysisConcentration(type, id) {
      if (!id || id === '0') return;
      
      showPortal('C');
      setTimeout(function() {
        var reportBtn = document.querySelector('[onclick*="selectReportTypeC(\'analysis\')"]');
        if (reportBtn) {
          reportBtn.click();
          setTimeout(function() {
            var searchInput = document.getElementById('searchInput');
            if (searchInput) {
              searchInput.value = id;
              if (typeof filterTable === 'function') {
                filterTable();
              }
            }
          }, 1000);
        }
      }, 800);
    }

    // Initialize on page load

      initializeDashboards();

        if (e.key === 'Enter' && document.getElementById('passwordSection').style.display === 'block') {
