<!-- Portal A Template -->
<template id="portalATemplate">
  <div class="portal-container portal-a-dark">
    <div class="portal-header" style="background: linear-gradient(to bottom, #ffffff, #f8fafc); border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; position: relative; border-radius: 12px 12px 0 0;">
      <button class="btn-back" onclick="goHome()" style="position: relative; z-index: 10;">
        <i class="fas fa-arrow-right"></i>
        <span>العودة</span>
      </button>
      
      <div style="position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center;">
         <div style="background: linear-gradient(135deg, #f8fafc, #f1f5f9); border: 1px solid #cbd5e1; padding: 8px 25px; border-radius: 30px; display: flex; align-items: center; gap: 10px; font-size: 1.1rem; font-weight: 800; color: #334155; box-shadow: inset 0 2px 4px rgba(255,255,255,1), 0 2px 5px rgba(0,0,0,0.05);">
           <i class="fas fa-cogs" style="color: #3b82f6;"></i>
           <span>ارسال تانك</span>
         </div>
         <div id="badgesPortalA"></div>
      </div>
      <div style="width: 80px;"></div>
    </div>

    <div class="portal-body">
      <div id="successMsg" class="success-msg" style="display: none;">
        <i class="fas fa-check-circle"></i>
        <span>تم حفظ البيانات بنجاح</span>
      </div>

      <form id="formA" onsubmit="submitFormA(event)">
        <button type="button" class="btn" style="background: linear-gradient(135deg, #1e293b, #0f172a); color: #fbbf24; width: 100%; border: 1px solid #d97706; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);" onclick="openEndShiftModal()">
          <i class="fas fa-flag-checkered"></i> إنهاء الوردية (تسليم الملصقات)
        </button>

        <div class="form-group">
          <label class="form-label">
            <i class="fas fa-box"></i> نوع الخامة *
          </label>
          <div id="materialBtns" class="toggle-group"></div>
        </div>

        <div id="preparationGroup" class="form-group" style="display: none;">
          <label class="form-label">
            <i class="fas fa-cog"></i> طريقة التحضير *
          </label>
          <div id="preparationBtns" class="toggle-group">
            <button type="button" class="toggle-btn" data-value="100">100</button>
            <button type="button" class="toggle-btn" data-value="50">50</button>
            <button type="button" class="toggle-btn" data-value="1">1</button>
            <button type="button" class="toggle-btn" data-value="2">2</button>
            <button type="button" class="toggle-btn" data-value="3">3</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">
            <i class="fas fa-hashtag"></i> العدد *
          </label>
          <input type="number" id="quantity" class="form-control" placeholder="1" min="1" step="1" inputmode="numeric" required>
        </div>

        <div class="form-group">
          <label class="form-label">
            <i class="fas fa-barcode"></i> رقم التانك *
          </label>
          <input type="number" id="serialNum" class="form-control" placeholder="رقم التانك (مثال: 1)" min="1" step="1" inputmode="numeric" required>
          <div id="serialFeedbackA" style="display: none; padding: 12px; border-radius: 6px; margin-top: 8px; font-size: 0.85rem; font-weight: bold; align-items: center; gap: 8px;">
            <i class="fas"></i>
            <span></span>
          </div>
        </div>

        <div class="button-group">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i>
            <span>حفظ</span>
          </button>
          <button type="button" class="btn btn-secondary" onclick="goHome()">
            <i class="fas fa-times"></i>
            <span>إلغاء</span>
          </button>
        </div>
      </form>
    </div>

    <div id="endShiftModal" class="modal-overlay" style="display: none; align-items: center; justify-content: center; z-index: 9999;">
      <div class="modal-content" style="max-width: 400px; width: 90%; background: #0f172a; border: 1px solid #334155; padding: 20px; border-radius: 12px; color: #f8fafc; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
        <h3 style="color: #fbbf24; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; display: flex; align-items: center; gap: 10px;">
           <i class="fas fa-flag-checkered"></i> إنهاء الوردية
        </h3>
        
        <div class="form-group" style="margin-bottom: 15px;">
          <label class="form-label" style="display: block; margin-bottom: 5px; color: #cbd5e1;">رقم الملصق القادم المتوقع *</label>
          <input type="number" id="handoverNextNumber" class="form-control" placeholder="أدخل رقم الملصق التالي هنا" style="width: 100%; padding: 10px; border: 1px solid #475569; border-radius: 6px; background: #1e293b; color: white;">
        </div>
        
        <div class="form-group" style="margin-bottom: 15px;">
          <label class="form-label" style="display: block; margin-bottom: 5px; color: #cbd5e1;">صورة الملصق القادم (إثبات التسلسل) *</label>
          <input type="file" id="handoverImage" accept="image/*" capture="environment" class="form-control" onchange="previewHandoverImage(event)" style="width: 100%; padding: 10px; border: 1px solid #475569; border-radius: 6px; background: #1e293b; color: white;">
          <div style="text-align: center;">
             <img id="handoverPreview" style="display:none; max-width:100%; margin-top:10px; border-radius:8px; border: 2px dashed #fbbf24;">
          </div>
        </div>
        
        <div class="button-group" style="display: flex; gap: 10px; margin-top: 20px;">
          <button type="button" class="btn" id="btnConfirmHandover" style="flex: 1; background-color: #2563eb; border: none; color: white; padding: 10px; border-radius: 6px; font-weight: bold;" onclick="submitHandover()">تأكيد ومطابقة</button>
          <button type="button" class="btn" style="flex: 1; background-color: #334155; border: none; color: white; padding: 10px; border-radius: 6px; font-weight: bold;" onclick="closeEndShiftModal()">إلغاء</button>
        </div>
      </div>
    </div>

    <div id="customAlertModal" class="modal-overlay" style="display: none; align-items: center; justify-content: center; z-index: 10000;">
      <div class="modal-content" style="max-width: 350px; width: 90%; background: #1e293b; border: 1px solid #475569; padding: 25px 20px; border-radius: 12px; color: white; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
        <div id="customAlertIcon" style="font-size: 3.5rem; margin-bottom: 15px;"></div>
        <h3 id="customAlertTitle" style="margin-bottom: 10px; font-size: 1.3rem; font-weight: bold;"></h3>
        <p id="customAlertMessage" style="color: #cbd5e1; font-size: 1rem; margin-bottom: 25px; line-height: 1.6; white-space: pre-wrap; font-weight: 500;"></p>
        <button type="button" class="btn" style="width: 100%; background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.2s;" onclick="document.getElementById('customAlertModal').style.display='none'">حسناً</button>
      </div>
    </div>

  </div>
</template>

<!-- Portal B Template -->
<template id="portalBTemplate">
  <div class="portal-container">
    <div class="portal-header" style="background: linear-gradient(to bottom, #ffffff, #f8fafc); border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; position: relative; border-radius: 12px 12px 0 0;">
      <button class="btn-back" onclick="goHome()" style="position: relative; z-index: 10;">
        <i class="fas fa-arrow-right"></i>
        <span>العودة</span>
      </button>
      
      <div style="position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center;">
         <div style="background: linear-gradient(135deg, #f8fafc, #f1f5f9); border: 1px solid #cbd5e1; padding: 8px 25px; border-radius: 30px; display: flex; align-items: center; gap: 10px; font-size: 1.1rem; font-weight: 800; color: #334155; box-shadow: inset 0 2px 4px rgba(255,255,255,1), 0 2px 5px rgba(0,0,0,0.05);">
           <i class="fas fa-flask" style="color: #10b981;"></i>
           <span>تحليل عينة</span>
         </div>
         <div id="badgesPortalB"></div>
      </div>
      <div style="width: 80px;"></div>
    </div>
    <div class="portal-body">
      <div id="successMsgB" class="success-msg" style="display: none;">
        <i class="fas fa-check-circle"></i>
        <span>تم حفظ البيانات بنجاح</span>
      </div>

      <form id="formB" onsubmit="submitFormB(event)">
        <div class="form-group">
          <label class="form-label">
            <i class="fas fa-vial"></i> نوع العينة *
          </label>
          <div class="toggle-group">
            <button type="button" class="toggle-btn" data-sample-type="product" onclick="selectSampleType('product')">عينة من منتج</button>
            <button type="button" class="toggle-btn" data-sample-type="tank" onclick="selectSampleType('tank')">تانك</button>
          </div>
        </div>

        <div id="tankPath" style="display: none;">
          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-barcode"></i> رقم التانك *
            </label>
            <input type="number" id="tankSerial" class="form-control" placeholder="أدخل رقم التانك (مثال: 1)" min="1" step="1" inputmode="numeric">
            <div id="serialFeedbackB" style="display: none; padding: 12px; border-radius: 6px; margin-top: 8px; font-size: 0.85rem; font-weight: bold; align-items: center; gap: 8px;">
              <i class="fas"></i>
              <span></span>
            </div>
          </div>
        </div>

        <div id="productPath" style="display: none;">
          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-bottle-droplet"></i> اسم المنتج *
            </label>
            <select id="productName" class="form-control">
              <option value="">-- اختر المنتج --</option>
            </select>
          </div>
        </div>

        <div id="commonFields" style="display: none;">
          <div class="form-group" id="labResultGroup">
            <label class="form-label">
              <i class="fas fa-chart-line"></i> نتيجة التحليل المعملي *
            </label>
            <div class="input-with-suffix">
              <input type="text" id="labResult" class="form-control" placeholder="0.00" inputmode="decimal">
              <span class="input-suffix">%</span>
            </div>
          </div>

          <div id="productOnlyFields" style="display: none;">
            <div class="form-group">
              <label class="form-label">
                <i class="fas fa-hashtag"></i> رقم التشغيلة *
              </label>
              <input type="text" id="refNumber" class="form-control" placeholder="رقم التشغيلة">
            </div>
          </div>

          <div class="form-group" id="commonImageUpload">
            <label class="form-label">
              <i class="fas fa-camera"></i> صورة التوثيق (اختياري)
            </label>
            <div class="image-upload-area">
              <input type="file" id="imageInput" accept="image/*" capture="environment" style="display: none;" onchange="previewImage(event)">
              <button type="button" class="btn-upload" onclick="document.getElementById('imageInput').click()">
                <i class="fas fa-camera"></i>
                <span>التقاط أو رفع صورة</span>
              </button>
              <div id="imagePreview" class="image-preview" style="display: none;">
                <img id="previewImg" src="" alt="Preview">
                <div class="image-actions">
                  <button type="button" class="btn btn-sm btn-success" onclick="confirmImage()">
                    <i class="fas fa-check"></i> تأكيد
                  </button>
                  <button type="button" class="btn btn-sm btn-secondary" onclick="reuploadImage()">
                    <i class="fas fa-redo"></i> إعادة رفع
                  </button>
                </div>
              </div>
              <div id="uploadedImageInfo" class="uploaded-info" style="display: none;">
                <i class="fas fa-check-circle"></i>
                <span>تم رفع الصورة بنجاح</span>
              </div>
            </div>
          </div>

          <div class="button-group">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-save"></i>
              <span>حفظ</span>
            </button>
            <button type="button" class="btn btn-secondary" onclick="goHome()">
              <i class="fas fa-times"></i>
              <span>إلغاء</span>
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</template>

<!-- Portal C Template - NO CHANGES -->
<template id="portalCTemplate">
  <div class="portal-container portal-c-wide">
    <div class="portal-header">
      <div class="portal-title">
        <i class="fas fa-chart-bar"></i>
        <span>التقارير</span>
      </div>
      <button class="btn-back" onclick="goHome()">
        <i class="fas fa-arrow-right"></i>
        <span>العودة</span>
      </button>
    </div>
    
    <div class="portal-body">
      <div class="form-group">
        <label class="form-label">
          <i class="fas fa-file-alt"></i> نوع التقرير
        </label>
        <div class="toggle-group" style="grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));">
          <button type="button" class="toggle-btn" onclick="selectReportTypeC('tank')">
            <i class="fas fa-fill-drip"></i> التانكات
          </button>
          <button type="button" class="toggle-btn" onclick="selectReportTypeC('analysis')">
            <i class="fas fa-microscope"></i> التحليلات
          </button>
          <button type="button" class="toggle-btn" onclick="selectReportTypeC('executive')">
            <i class="fas fa-chart-pie"></i> أداء الإنتاج
          </button>
        </div>
      </div>

      <div id="filtersSection" class="filters-card" style="display: none;">
        <div class="filters-header">
          <i class="fas fa-filter"></i>
          <span>الفلاتر والبحث</span>
        </div>
        
        <div class="filters-body">
          <div class="filter-row">
            <div class="filter-group">
              <label class="filter-label">من تاريخ</label>
              <input type="date" id="startDateC" class="form-control">
            </div>
            <div class="filter-group">
              <label class="filter-label">إلى تاريخ</label>
              <input type="date" id="endDateC" class="form-control">
            </div>
          </div>

          <div class="filter-row quick-date-btns">
            <button class="btn btn-secondary btn-filter" onclick="setTodayDate()">
              <i class="fas fa-calendar-day"></i>
              <span>اليوم</span>
            </button>
            <button class="btn btn-secondary btn-filter" onclick="setWeekDate()">
              <i class="fas fa-calendar-week"></i>
              <span>هذا الأسبوع</span>
            </button>
            <button class="btn btn-secondary btn-filter" onclick="setMonthDate()">
              <i class="fas fa-calendar-alt"></i>
              <span>هذا الشهر</span>
            </button>
          </div>

          <div class="filter-row">
            <div class="search-box-wrapper">
              <i class="fas fa-search search-icon"></i>
              <input type="text" id="searchInput" class="form-control search-input" 
                     placeholder="ابحث في التقرير..." 
                     onkeyup="filterTable()">
              <button class="btn-clear-search" id="clearSearchBtn" onclick="clearSearch()" style="display: none;">
                <i class="fas fa-times"></i>
              </button>
            </div>
          </div>

          <div class="filter-row action-btns">
            <button class="btn btn-primary" onclick="loadReportData()">
              <i class="fas fa-sync-alt"></i>
              <span>تحميل البيانات</span>
            </button>
            <button class="btn btn-secondary" onclick="resetFilters()">
              <i class="fas fa-redo"></i>
              <span>إعادة تعيين</span>
            </button>
          </div>
        </div>
      </div>

      <div id="reportDisplayC" style="display: none;">
        <div id="summaryStats" class="summary-stats"></div>

        <div class="export-buttons">
          <button class="btn btn-success" onclick="exportToExcelC()">
            <i class="fas fa-file-excel"></i>
            <span>تصدير Excel</span>
          </button>
          <button class="btn btn-secondary" onclick="printReport()">
            <i class="fas fa-print"></i>
            <span>طباعة</span>
          </button>
        </div>

        <div class="report-table-container">
          <table id="reportTable" class="report-table">
            <thead id="reportTableHead"></thead>
            <tbody id="reportTableBody"></tbody>
          </table>
          
          <div id="noDataMessage" class="no-data-message" style="display: none;">
            <i class="fas fa-inbox"></i>
            <p>لا توجد بيانات للفترة المحددة</p>
          </div>
        </div>
      </div>

      <div id="executiveReportSection" style="display: none;" class="mt-4">
         <div class="bg-white p-5 rounded-xl shadow-sm mb-6 border border-slate-200 relative overflow-hidden" style="box-shadow: 0 4px 15px rgba(0,0,0,0.03);">
            <div class="absolute top-0 right-0 left-0 h-1 bg-blue-600"></div>
            
            <h3 class="text-sm font-bold text-slate-700 mb-4 relative z-10"><i class="fas fa-filter ml-2 text-blue-500"></i>لوحة التحكم والفلترة</h3>
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-5 items-end relative z-10">
               <div class="md:col-span-2">
                  <div class="grid grid-cols-2 gap-4">
                     <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1.5 tracking-wide">من تاريخ</label>
                        <input type="date" id="repStartDate" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-slate-50 text-slate-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none">
                     </div>
                     <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1.5 tracking-wide">إلى تاريخ</label>
                        <input type="date" id="repEndDate" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-slate-50 text-slate-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none">
                     </div>
                  </div>
                  <div class="flex flex-wrap gap-2 mt-3">
                     <button onclick="setRepQuickDate('month')" class="px-4 py-1 bg-white border border-slate-200 text-slate-600 hover:border-blue-500 hover:text-blue-600 hover:bg-blue-50 rounded-full text-[11px] font-bold transition-all shadow-sm">الشهر الحالي</button>
                     <button onclick="setRepQuickDate('week')" class="px-4 py-1 bg-white border border-slate-200 text-slate-600 hover:border-blue-500 hover:text-blue-600 hover:bg-blue-50 rounded-full text-[11px] font-bold transition-all shadow-sm">هذا الأسبوع</button>
                     <button onclick="setRepQuickDate('today')" class="px-4 py-1 bg-white border border-slate-200 text-slate-600 hover:border-blue-500 hover:text-blue-600 hover:bg-blue-50 rounded-full text-[11px] font-bold transition-all shadow-sm">اليوم</button>
                     <button onclick="setRepQuickDate('all')" class="px-4 py-1 bg-white border border-slate-200 text-slate-600 hover:border-blue-500 hover:text-blue-600 hover:bg-blue-50 rounded-full text-[11px] font-bold transition-all shadow-sm">كل الفترات</button>
                  </div>
               </div>
               
               <div>
                  <label class="block text-xs font-bold text-slate-500 mb-1.5 tracking-wide">تصفية بالمنتج</label>
                  <select id="repProduct" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-slate-50 text-slate-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none">
                     <option value="الكل">جميع المنتجات</option>
                  </select>
               </div>
               
               <div class="h-full flex items-start mt-2 md:mt-0 md:items-end gap-2">
                  <button onclick="loadExecutiveReport()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-2 rounded-lg shadow-md hover:shadow-lg transition-all border-none flex items-center justify-center gap-2 mb-[1px] text-xs">
                     <i class="fas fa-sync-alt"></i> تحديث
                  </button>
                  <button onclick="manualSyncPerformance()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-2 rounded-lg shadow-md hover:shadow-lg transition-all border-none flex items-center justify-center gap-2 mb-[1px] text-xs" title="اعتماد وحفظ بيانات التكاليف للتواريخ المحددة وما يليها">
                     <i class="fas fa-database"></i> أرشفة
                  </button>
               </div>
            </div>
         </div>

         <div class="flex flex-wrap md:flex-nowrap gap-3 mb-6 w-full">
            <div class="flex-1 min-w-[130px] bg-white p-3 rounded-lg border-[3px] border-green-600 flex flex-col gap-1 shadow-sm">
               <div class="flex items-center justify-between mb-1">
                  <span class="text-sm font-black text-gray-800">إجمالي الإنتاج</span>
                  <i class="fas fa-calculator text-green-500 text-[11px]"></i>
               </div>
               <span id="repKpiProd" class="text-base font-black text-gray-800 mt-auto">00:00:00</span>
            </div>
            <div class="flex-1 min-w-[130px] bg-white p-3 rounded-lg border-[3px] border-red-500 flex flex-col gap-1 shadow-sm">
               <div class="flex items-center justify-between mb-1">
                  <span class="text-sm font-black text-gray-800">إجمالي المهدر</span>
                  <i class="fas fa-exclamation-triangle text-red-500 text-[11px]"></i>
               </div>
               <span id="repKpiWaste" class="text-base font-black text-gray-800 mt-auto">00:00:00</span>
            </div>
            <div class="flex-1 min-w-[130px] bg-white p-3 rounded-lg border-[3px] border-amber-400 flex flex-col gap-1 shadow-sm">
               <div class="flex items-center justify-between mb-1">
                  <span class="text-sm font-black text-gray-800">وقت الراحة</span>
                  <i class="fas fa-mug-hot text-amber-500 text-[11px]"></i>
               </div>
               <span id="repKpiBreak" class="text-base font-black text-gray-800 mt-auto">00:00:00</span>
            </div>
            <div class="flex-1 min-w-[130px] bg-white p-3 rounded-lg border-[3px] border-purple-600 flex flex-col gap-1 shadow-sm">
               <div class="flex items-center justify-between mb-1">
                  <span class="text-sm font-black text-gray-800">وقت إضافي</span>
                  <i class="fas fa-clock text-purple-500 text-[11px]"></i>
               </div>
               <span id="repKpiOt" class="text-base font-black text-gray-800 mt-auto">00:00:00</span>
            </div>

<script>
  // Production Portal functions
  var prodDataList = [];
  var uploadedProdImage = null;

  var overrideSystemDate = null; // Secret admin date

  function getActiveDateStr() {
    if (overrideSystemDate) return overrideSystemDate;
    const today = new Date();
    return today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  }

  let longPressTimer;

  function setupNinjaListener() {
    const timeTag = document.getElementById('currentTimeHeaderTag');
    if(!timeTag) return;
    
    const startPress = (e) => {
      longPressTimer = setTimeout(() => {
        document.getElementById('adminPin').value = '';
        document.getElementById('secretAdminModal').style.display = 'flex';
        // Auto-focus the PIN input for immediate typing
        setTimeout(() => document.getElementById('adminPin').focus(), 100);
      }, 1500); // 1.5 seconds long press
    };
    const cancelPress = () => { clearTimeout(longPressTimer); };

    timeTag.addEventListener('mousedown', startPress);
    timeTag.addEventListener('touchstart', startPress);
    timeTag.addEventListener('mouseup', cancelPress);
    timeTag.addEventListener('mouseleave', cancelPress);
    timeTag.addEventListener('touchend', cancelPress);
    
    timeTag.style.cursor = 'crosshair';
  }

  function activateAdminMode() {
    const pin = document.getElementById('adminPin').value;
    if(!pin) return;
    
    showLoading();
    google.script.run
      .withSuccessHandler(function(result) {
        hideLoading();
        // Check if the passcode is valid AND the user is exactly "Sherif"
        if(result.valid && result.userName === 'Sherif') { 
           document.getElementById('secretAdminModal').style.display = 'none';
           document.getElementById('adminStealthToolbar').style.display = 'flex';
           
           const datePicker = document.getElementById('permanentAdminDate');
           if(!datePicker.value) {
              datePicker.value = getActiveDateStr();
           }
           
           applyOverrideDate(datePicker.value);
        } else {
           alert('الرمز السري خاطئ أو ليس لديك صلاحية الإدارة!');
           document.getElementById('secretAdminModal').style.display = 'none';
        }
      })
      .withFailureHandler(function(error) {
        hideLoading();
        alert('خطأ في التحقق من الرمز: ' + error.message);
      })
      .loginUser(pin, 'PROD');
  }

  function applyOverrideDate(selectedDate) {
    if(!selectedDate) return;
    overrideSystemDate = selectedDate;
    
    const timeTag = document.getElementById('currentTimeHeaderTag');
    timeTag.style.backgroundColor = '#b91c1c'; // Red to indicate secret mode
    timeTag.style.borderColor = '#991b1b';
    timeTag.textContent = 'سجل: ' + overrideSystemDate;
    
    loadProdSessions();
  }

  function resetOverrideDate() {
    overrideSystemDate = null;
    document.getElementById('adminStealthToolbar').style.display = 'none';
    document.getElementById('permanentAdminDate').value = '';
    
    const timeTag = document.getElementById('currentTimeHeaderTag');
    timeTag.style.backgroundColor = '#2563eb';
    timeTag.style.borderColor = '#1d4ed8';
    
    loadProdSessions();
  }

  function initPortalProd() {
    showLoading();
    google.script.run
      .withSuccessHandler(function(res) {
        hideLoading();
        const sel = document.getElementById('prodSelect');
        sel.innerHTML = '<option value="">-- اختر المنتج --</option>';
        res.products.forEach(function(p) {
          let opt = document.createElement('option');
          opt.value = p; opt.textContent = p;
          sel.appendChild(opt);
        });
        setupNinjaListener();
        loadProdSessions();
      })
      .withFailureHandler(function(e) { hideLoading(); alert(e.message); })
      .getProdSetup();
  }

  function loadProdSessions() {
    document.getElementById('activeSessionsList').innerHTML = '<div class="dashboard-loading"><i class="fas fa-spinner fa-spin"></i><span>جاري التحميل...</span></div>';
    google.script.run
      .withSuccessHandler(function(data) {
        prodDataList = data || [];
        renderProdSessions();
      })
      .withFailureHandler(function(e) { alert(e.message); })
      .getTodayProdSessions(overrideSystemDate);
  }

  function formatDuration(mins) {
    if (!mins) return '0 د';
    let h = Math.floor(mins / 60);
    let m = mins % 60;
    if (h > 0 && m > 0) return h + ' س و ' + m + ' د';
    if (h > 0) return h + ' س';
    return m + ' د';
  }

  function getMins(t) {
    if(!t) return 0;
    let p = String(t).split(':');
    return parseInt(p[0]||0)*60 + parseInt(p[1]||0);
  }
  
  function getHM(m) {
    let h = Math.floor(m/60); let mn = m%60;
    return (h<10?'0':'')+h+':'+(mn<10?'0':'')+mn;
  }

  function renderProdSessions() {
    const activeList = document.getElementById('activeSessionsList');
    const historyList = document.getElementById('historySessionsList');
    const pausedList = document.getElementById('pausedSessionsList');
    if(activeList) activeList.innerHTML = ''; 
    if(historyList) historyList.innerHTML = '';
    if(pausedList) pausedList.innerHTML = '';
    
    // CRITICAL FIX: Completely purge 'Cancelled' sessions before any math or rendering occurs
    if (typeof prodDataList !== 'undefined' && Array.isArray(prodDataList)) {
        prodDataList = prodDataList.filter(s => s.status !== 'Cancelled' && s.status !== 'ملغي');
    }

    // ISOLATE TIMELINE: Filter strictly for today's physical time segments
    let targetDate = getActiveDateStr();
    let timelineDataList = prodDataList.filter(s => s.date === targetDate);

    let hasActive = false; let hasHistory = false; let hasPaused = false;
    let nowMins = getMins(new Date().toTimeString().substring(0,5));
    
    // KPI Data Gathering
    let actualStart = 1440; let actualEnd = 0;
    let totalProd = 0; let totalBreak = 0; let totalWaste = 0;
    let prodBreakdown = {};

    // 1. Collect Break Intervals to subtract from Production Sessions
    let breakIntervals = [];
    timelineDataList.forEach(function(s) {
      if (s.product === 'وقت الراحة') {
        let sM = getMins(s.startTime);
        let eM = s.status === 'Active' ? nowMins : getMins(s.endTime);
        let dur = eM - sM; if(dur < 0) dur += 1440;
        breakIntervals.push({start: sM, end: sM + dur});
      }
    });

    timelineDataList.forEach(function(s) {
      let sM = getMins(s.startTime);
      let eM = s.status === 'Active' ? nowMins : getMins(s.endTime);
      let dur = eM - sM; if(dur < 0) dur += 1440;
      let absEM = sM + dur;
      
      if(sM < actualStart) actualStart = sM;
      if(eM > actualEnd) actualEnd = eM;

      if (s.product === 'وقت مهدر') {
        totalWaste += dur;
      } else if (s.product === 'وقت الراحة') {
        totalBreak += dur;
      } else {
        // Subtract overlapping breaks for Net Production Time
        let netDur = dur;
        breakIntervals.forEach(b => {
           let overlapStart = Math.max(sM, b.start);
           let overlapEnd = Math.min(absEM, b.end);
           if (overlapStart < overlapEnd) netDur -= (overlapEnd - overlapStart);
        });
        totalProd += netDur;
        prodBreakdown[s.product] = (prodBreakdown[s.product] || 0) + netDur;
        s.netDuration = netDur; // Save net duration for UI chips
      }
    });

    // Make-Up & Overtime Logic
    let shiftStart = (timelineDataList.length > 0 && actualStart < 480) ? actualStart : 480;
    let shiftEnd = shiftStart + 510; // +8.5 hours
    let deficit = (timelineDataList.length > 0 && actualStart > 480) ? actualStart - 480 : 0;
    
    let extraMins = actualEnd > shiftEnd ? actualEnd - shiftEnd : 0;
    let compMins = Math.min(deficit, extraMins); // Flex-Time logic
    let overtimeMins = extraMins - compMins;

    // Update Scorecards with Formatted Durations and Variations
    let actualStartDisplay = (actualStart === 1440) ? 480 : actualStart;
    let actualEndDisplay = (actualEnd === 0) ? 990 : actualEnd;

    document.getElementById('kpiShiftStart').textContent = getHM(actualStartDisplay);
    let startVar = actualStartDisplay - 480;
    let elStartVar = document.getElementById('kpiShiftStartVar');
    if (startVar > 0) { elStartVar.textContent = `(تأخير ${formatDuration(startVar)})`; elStartVar.className = "text-[10px] text-red-500 font-bold"; }
    else if (startVar < 0) { elStartVar.textContent = `(مبكر ${formatDuration(Math.abs(startVar))})`; elStartVar.className = "text-[10px] text-green-500 font-bold"; }
    else { elStartVar.textContent = ''; }

    document.getElementById('kpiShiftEnd').textContent = getHM(actualEndDisplay);
    let endVar = actualEndDisplay - 990;
    let elEndVar = document.getElementById('kpiShiftEndVar');
    if (endVar > 0) { elEndVar.textContent = `(+ ${formatDuration(endVar)})`; elEndVar.className = "text-[10px] text-purple-500 font-bold"; }
    else if (endVar < 0) { elEndVar.textContent = `(- ${formatDuration(Math.abs(endVar))})`; elEndVar.className = "text-[10px] text-gray-400 font-bold"; }
    else { elEndVar.textContent = ''; }

    document.getElementById('kpiProdTotal').textContent = formatDuration(totalProd);
    document.getElementById('kpiBreakTotal').textContent = formatDuration(totalBreak);
    document.getElementById('kpiWasteTotal').textContent = formatDuration(totalWaste);
    
    const otCard = document.getElementById('kpiOvertimeCard');
    if (overtimeMins > 0 || compMins > 0) {
      otCard.classList.remove('hidden');
      otCard.classList.add('flex');
      document.getElementById('kpiOvertimeTotal').textContent = formatDuration(overtimeMins);
    } else {
      otCard.classList.add('hidden');
      otCard.classList.remove('flex');
    }

    // Render RTL Timeline & Lanes
    let tlStart = shiftStart;
    let tlEnd = Math.max(shiftEnd, actualEnd);
    let tlSpan = tlEnd - tlStart; if(tlSpan === 0) tlSpan = 1;
    
    let tlHTML = '';
    let chipsHTML = '';
    let placedSessions = [];
    let transitions = new Set([tlStart, tlEnd, nowMins]);
    
    function getLane(startM, endM) {
      let lane = 0;
      let overlapping = true;
      while(overlapping) {
        overlapping = false;
        for(let i=0; i<placedSessions.length; i++) {
           if(placedSessions[i].lane === lane) {
              if(Math.max(startM, placedSessions[i].start) < Math.min(endM, placedSessions[i].end)) {
                 overlapping = true; lane++; break;
              }
           }
        }
      }
      placedSessions.push({start: startM, end: endM, lane: lane});
      return lane;
    }

    timelineDataList.forEach(function(s) {
      let sM = getMins(s.startTime);
      let eM = s.status === 'Active' ? nowMins : getMins(s.endTime);
      let dur = eM - sM; if(dur < 0) dur += 1440;
      let absEM = sM + dur;
      
      transitions.add(sM);
      transitions.add(eM);
      
      let lane = getLane(sM, absEM);
      let topPx = lane * 30; // 30px height per lane
      let rightPct = ((sM - tlStart) / tlSpan) * 100;
      let widthPct = (dur / tlSpan) * 100;
      
      let bg = 'bg-blue-500';
      let clickableStr = `cursor-pointer`;
      let onclickStr = `onclick="openEditModal('${s.id}')"`;
      
      if (s.product === 'وقت مهدر') {
         bg = 'bg-red-500';
         clickableStr = ''; 
         onclickStr = '';
      } else if (s.product === 'وقت الراحة') {
         bg = 'bg-yellow-400';
      }
      
      // Inject lane-based session block
      tlHTML += `<div class="absolute opacity-75 hover:opacity-100 transition-opacity ${bg} ${clickableStr}" style="right:${rightPct}%; width:${widthPct}%; top:${topPx}px; height: 26px; border-right: 1px solid rgba(255,255,255,0.3); border-radius: 4px;" title="${s.product}" ${onclickStr}></div>`;
      
      // Active floating buttons
      if (s.status === 'Active') {
         let icon = (s.product === 'وقت الراحة') ? 'fa-stop-circle' : 'fa-flag-checkered';
         let label = (s.product === 'وقت الراحة') ? 'إنهاء الراحة' : 'إنهاء';
         let onclickAction = (s.product === 'وقت الراحة') ? `openEndBreakModal('${s.id}')` : `openEndModal('${s.id}')`;
         let color = (s.product === 'وقت الراحة') ? 'bg-amber-100 text-amber-800 border-amber-400' : 'bg-blue-100 text-blue-800 border-blue-400';

         tlHTML += `<div class="absolute flex justify-center items-center z-50 pointer-events-none" style="right:${rightPct}%; width:${widthPct}%; top:${topPx - 25}px; min-width: 60px;">
            <button onclick="${onclickAction}" class="pointer-events-auto ${color} text-[9px] font-bold px-2 py-0.5 rounded shadow-sm whitespace-nowrap transition-transform hover:scale-105 cursor-pointer">
               <i class="fas ${icon} mr-1"></i> ${label}
            </button>
         </div>`;
      }
      
      // Chip text perfectly overlaid inside the colored block
      if (s.product !== 'وقت مهدر' && widthPct > 5) {
         let durText = (s.netDuration !== undefined) ? formatDuration(s.netDuration) : formatDuration(dur);
         tlHTML += `<div class="absolute flex items-center text-[10px] font-bold text-white z-20 pointer-events-none px-2" style="right:${rightPct}%; top:${topPx}px; height: 26px; width:${widthPct}%; overflow:hidden;">
           <span class="truncate drop-shadow-md">${s.product} (${durText})</span>
         </div>`;
      }
    });

    if (compMins > 0) {
      transitions.add(shiftEnd);
      let cRight = ((shiftEnd - tlStart) / tlSpan) * 100;
      let cWidth = (compMins / tlSpan) * 100;
      tlHTML += `<div class="absolute h-full opacity-80 bg-orange-400" style="right:${cRight}%; width:${cWidth}%; border-right: 1px solid rgba(255,255,255,0.3);" title="تعويض تأخير"></div>`;
    }
    if (overtimeMins > 0) {
      transitions.add(shiftEnd + compMins);
      let oRight = (((shiftEnd + compMins) - tlStart) / tlSpan) * 100;
      let oWidth = (overtimeMins / tlSpan) * 100;
      tlHTML += `<div class="absolute h-full opacity-80 bg-purple-500" style="right:${oRight}%; width:${oWidth}%; border-right: 1px solid rgba(255,255,255,0.3);" title="وقت إضافي"></div>`;
    }

    let maxLane = placedSessions.length > 0 ? Math.max(...placedSessions.map(c => c.lane)) : 0;
    let visualTimelineHeight = ((maxLane + 1) * 30);
    
    // Convert Timeline to dynamic height block instead of fixed pill
    let vtl = document.getElementById('visualTimeline');
    vtl.style.height = visualTimelineHeight + 'px';
    vtl.classList.remove('rounded-full', 'h-6', 'overflow-hidden'); 
    vtl.classList.add('rounded-xl');

    // Sync transitions container height so bottom/top placements align perfectly with the dynamic timeline height
    let transContainer = document.getElementById('timelineTransitions');
    transContainer.style.height = visualTimelineHeight + 'px';

    // Draw Alternating Dotted Lines for Transitions
    let transHTML = '';
    let transArray = Array.from(transitions).filter(m => m >= tlStart && m <= tlEnd && m !== nowMins).sort((a,b) => a - b);
    
    transArray.forEach((m, idx) => {
      let rPct = ((m - tlStart) / tlSpan) * 100;
      let isUp = (idx % 2 === 0);
      
      if (isUp) {
        transHTML += `<div class="absolute bottom-full border-r border-dashed border-gray-400 flex flex-col items-center" style="right:${rPct}%; height: 28px; transform: translateX(50%);">
           <span class="text-[10px] text-gray-600 font-bold bg-white px-1 absolute -top-4 rounded shadow-sm border border-gray-200 whitespace-nowrap z-10">${getHM(m)}</span>
        </div>`;
      } else {
        // Now it stretches strictly from the very bottom of the timeline downwards
        transHTML += `<div class="absolute top-full border-r border-dashed border-gray-400 flex flex-col items-center" style="right:${rPct}%; height: 28px; transform: translateX(50%);">
           <span class="text-[10px] text-gray-600 font-bold bg-white px-1 absolute -bottom-4 rounded shadow-sm border border-gray-200 whitespace-nowrap z-10">${getHM(m)}</span>
        </div>`;
      }
    });

    let nowRight = ((nowMins - tlStart) / tlSpan) * 100;
    
    // Only show the "Now" line if we are looking at actual today
    if (!overrideSystemDate && nowRight >= 0 && nowRight <= 100) {
      transHTML += `<div class="absolute top-[-8px] bottom-[-8px] border-r-[3px] border-blue-600 z-30" style="right:${nowRight}%;" title="الآن ${getHM(nowMins)}">
         <div class="absolute -bottom-3 right-[50%] translate-x-[50%] w-3 h-3 bg-blue-600 rounded-full shadow"></div>
      </div>`;
    }

    if (!overrideSystemDate) {
      document.getElementById('currentTimeHeaderTag').textContent = 'الآن ' + getHM(nowMins);
    }
    transContainer.innerHTML = transHTML;
    vtl.innerHTML = tlHTML;
    
    // Use the old chipsContainer as a dedicated bottom spacer to prevent downward lines from clashing with the legend
    const chipsContainer = document.getElementById('timelineChipsContainer');
    chipsContainer.innerHTML = '';
    chipsContainer.style.display = 'block';
    chipsContainer.style.height = '45px';

    // Render Cards
    prodDataList.forEach(function(session) {
      const card = document.createElement('div');
      let iconHTML = '<i class="fas fa-box"></i>';
      let cardClass = 'prod-card';
      let statusHTML = session.status === 'Active' ? '<span class="prod-status status-active">نشط</span>' : '<span class="prod-status status-completed">مكتمل</span>';
      
      if (session.product === 'وقت مهدر') {
        iconHTML = '<i class="fas fa-exclamation-triangle" style="color:#ef4444; margin-left:8px;"></i>';
        cardClass = 'prod-card card-waste';
        statusHTML = '';
      } else if (session.product === 'وقت الراحة') {
        iconHTML = '<i class="fas fa-mug-hot" style="color:#d97706; margin-left:8px;"></i>';
        cardClass = 'prod-card card-break';
        statusHTML = '';
      }

      // Display netDuration if available, otherwise fallback to raw duration string
      let displayDurText = (session.netDuration !== undefined) ? formatDuration(session.netDuration) : (session.duration ? formatDuration(session.duration) : '');

      let timeChips = '<div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px;">' +
        '<span class="time-chip chip-start"><i class="fas fa-play"></i> ' + session.startTime + '</span>' +
        (session.endTime ? '<span class="time-chip chip-end"><i class="fas fa-stop"></i> ' + session.endTime + '</span>' : '') +
        (displayDurText ? '<span class="time-chip chip-dur"><i class="fas fa-clock"></i> ' + displayDurText + '</span>' : '') +
        '</div>';

      let historyBtnHTML = session.editHistory ? 
        '<button class="btn btn-secondary btn-sm" style="width:100%; margin-top:8px; background: #f1f5f9; border:none;" onclick="toggleHistory(this)"><i class="fas fa-history"></i> سجل التعديلات <i class="fas fa-chevron-down"></i></button>' +
        '<div class="edit-history-box">' + session.editHistory + '</div>' : '';

      if (session.status === 'Active') {

        hasActive = true;
        card.className = cardClass;
        card.innerHTML = 
          '<div class="prod-card-header" style="margin-bottom:10px; padding-bottom:5px;">' +

          '</div>' +

            '<div class="prod-detail"><span>الكمية:</span><span>' + session.quantity + '</span></div><div class="prod-detail"><span>المتوسط:</span><span>' + session.avg + ' د/وحدة</span></div>' +

            (session.image ? '<div class="prod-detail" style="margin-top:5px;"><button class="btn btn-secondary btn-sm" style="background:#f0f9ff; color:#0369a1; border-color:#bae6fd; width:100%;" onclick="openImagePreview(\'' + session.image + '\')"><i class="fas fa-image"></i> عرض الصورة المرفقة</button></div>' : '') +
            (session.notes ? '<div class="prod-detail" style="margin-top:5px; flex-direction:column;"><span>ملاحظات:</span><span style="font-weight:normal;">' + session.notes + '</span></div>' : '') +

  function toggleCardDetails(btn) {

    if(body.classList.contains('collapsed')) {

    }

function submitProdAction(action) {
    const eTime = document.getElementById('prodEndTime').value;
    const qty = document.getElementById('prodEndQty').value;
    const notes = document.getElementById('prodEndNotes').value;

    if (!eTime) return alert("يرجى إدخال الوقت المحدد");
    if (action === 'complete' && !qty) return alert("يرجى إدخال الكمية المنتجة قبل الإنهاء");
    if ((action === 'pause' || action === 'cancel') && !notes) return alert("يرجى ذكر السبب في حقل الملاحظات");
    
    document.getElementById('endModal').style.display = 'none';
    showLoading();
    
    const data = {
      sessionId: document.getElementById('endSessionId').value,
      user: currentUser, endTime: eTime, quantity: parseFloat(qty) || 0,
      notes: notes, action: action
    };
    
    if (uploadedProdImage) {
      google.script.run
        .withSuccessHandler(function(res) {
          data.imageUrl = res.url;
          finalizeEndProd(data); // Safely utilizes your existing finalize hook
        })
        .withFailureHandler(function(e) { hideLoading(); alert("خطأ في رفع الصورة: " + e.message); finalizeEndProd(data); })
        .uploadImageToDrive(uploadedProdImage, 'Prod_' + data.sessionId + '.jpg');
    } else {
      finalizeEndProd(data);
    }
  }

    const modal = document.getElementById('imagePreviewModal');

    let directUrl = url;
    // Extract the Google Drive ID safely

      directUrl = 'https://lh3.googleusercontent.com/d/' + idMatch[0];

    container.style.display = 'flex';

    if (result.type === 'error') {

      container.style.backgroundColor = '#fee2e2';

      container.style.backgroundColor = '#e0f2fe';
      container.style.borderColor = '#7dd3fc';
      container.style.color = '#0369a1';

      container.style.backgroundColor = '#fef3c7';
      container.style.borderColor = '#fcd34d';

  function setRepQuickDate(type) {
    const today = new Date();
    const startInput = document.getElementById('repStartDate');
    const endInput = document.getElementById('repEndDate');
    
    if (type === 'all') {
        startInput.value = '';
        endInput.value = '';
        document.getElementById('repProductTable').innerHTML = '<tr><td colspan="6" class="px-6 py-10 text-center text-slate-400"><i class="fas fa-spinner fa-spin text-2xl mb-2"></i><br>جاري جلب السجلات...</td></tr>';
        
        google.script.run.withSuccessHandler(function(res) {
            if (res.min) startInput.value = res.min;
            if (res.max) endInput.value = res.max;
            loadExecutiveReport();
        }).getProductionDateRange();
        return;
    }
    
    let start = new Date();
    let end = new Date();
    
    if (type === 'today') {
        // Keep as today
    } else if (type === 'week') {
        let day = today.getDay(); // 0 is Sunday, 6 is Saturday
        let diff = day === 6 ? 0 : day + 1; // Subtract to reach last Saturday
        start.setDate(today.getDate() - diff);
    } else if (type === 'month') {
        start.setDate(1);
        end = new Date(today.getFullYear(), today.getMonth() + 1, 0); // Last day
    }
    
    // Format YYYY-MM-DD safely
    const yS = start.getFullYear(), mS = String(start.getMonth() + 1).padStart(2, '0'), dS = String(start.getDate()).padStart(2, '0');
    const yE = end.getFullYear(), mE = String(end.getMonth() + 1).padStart(2, '0'), dE = String(end.getDate()).padStart(2, '0');
    
    startInput.value = `${yS}-${mS}-${dS}`;
    endInput.value = `${yE}-${mE}-${dE}`;
    
    loadExecutiveReport();
  }

  function selectMaterial(btn) {
    document.querySelectorAll('#materialBtns .toggle-btn').forEach(function(b) { 
      b.classList.remove('active');
    });
    btn.classList.add('active');
    
    selectedMaterial = btn.getAttribute('data-value');
    selectedMaterialIndex = parseInt(btn.getAttribute('data-index'));
    
    const prepGroup = document.getElementById('preparationGroup');
    if (selectedMaterialIndex === 2 || selectedMaterialIndex === 3) {
      prepGroup.style.display = 'block';
    } else {
      prepGroup.style.display = 'none';
      selectedPreparation = '';
      document.querySelectorAll('#preparationBtns .toggle-btn').forEach(function(b) { 
        b.classList.remove('active');
      });
    }
    
    // Check if material is blossom or rose
    const materialLower = selectedMaterial.toLowerCase().trim();
    const isBlossomOrRose = (materialLower === 'blossom' || materialLower === 'rose');
    
    const serialInput = document.getElementById('serialNum');
    
    if (isBlossomOrRose) {
      // Disable serial number for Blossom/Rose
      serialInput.disabled = true;
      serialInput.removeAttribute('required');
      serialInput.value = '';
      document.getElementById('serialError').style.display = 'none';
    } else {
      // Enable serial number for regular materials
      serialInput.disabled = false;
      serialInput.setAttribute('required', 'required');
      serialInput.value = '';
      document.getElementById('serialFeedbackA').style.display = 'none';
      isTankValidA = false;
    }
  }

  function formatDateForInput(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return year + '-' + month + '-' + day;
  }

  function loadReportData() {
    if (!currentReportTypeC) {
      alert('الرجاء اختيار نوع التقرير');
      return;
    }
    
    const startDate = document.getElementById('startDateC').value;
    const endDate = document.getElementById('endDateC').value;
    
    if (!startDate || !endDate) {
      alert('الرجاء تحديد الفترة الزمنية');
      return;

  function filterTable() {
    const searchInput = document.getElementById('searchInput');
    const searchTerm = searchInput.value.trim().toLowerCase();
    const clearBtn = document.getElementById('clearSearchBtn');
    
    clearBtn.style.display = searchTerm ? 'block' : 'none';
    
    if (!searchTerm) {
      filteredReportData = fullReportData;
      displayReport(fullReportData);
      return;
    }
    
    filteredReportData = fullReportData.filter(function(row) {
      const rowText = Object.values(row).join('|').toLowerCase();
      return rowText.includes(searchTerm);
    });
    
    displayReport(filteredReportData);
    highlightSearchTerm(searchTerm);
  }

  function highlightSearchTerm(term) {
    const tbody = document.getElementById('reportTableBody');
    const cells = tbody.getElementsByTagName('td');
    
    Array.from(cells).forEach(function(cell) {
      const text = cell.textContent;
      const lowerText = text.toLowerCase();
      const index = lowerText.indexOf(term);
      
      if (index !== -1) {
        const before = text.substring(0, index);
        const match = text.substring(index, index + term.length);
        const after = text.substring(index + term.length);
        
        cell.innerHTML = before + '<span class="highlight">' + match + '</span>' + after;
      }
    });
  }

  function formatDurationHHMMSS(mins) {
    if (!mins || isNaN(mins) || mins === Infinity) return '00:00:00';
    let totalSeconds = Math.round(mins * 60);
    let h = Math.floor(totalSeconds / 3600);
    let m = Math.floor((totalSeconds % 3600) / 60);
    let s = totalSeconds % 60;
    return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  }

  function formatReportDuration(mins) {
    if (!mins || isNaN(mins)) return '00:00:00';
    const totalSeconds = Math.round(mins * 60);
    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;
    return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

function calculateExpiry() {
  const prodDateStr = document.getElementById('tdsDate').value;
  if (!prodDateStr || !tdsDetails.shelfLife) return;
  
  // Extract number from "24 Months" string
  const months = parseInt(tdsDetails.shelfLife);
  if(isNaN(months)) return;
  
  const prodDate = new Date(prodDateStr);
  const expDate = new Date(prodDate);
  expDate.setMonth(expDate.getMonth() + months);
  // Subtract 1 day for proper expiry
  expDate.setDate(expDate.getDate() - 1);
  
  document.getElementById('tdsExpDate').valueAsDate = expDate;
}

          </a>
          <button onclick="resetTDSForm()" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Back
          </button>
        </div>
      `;
    })
    .withFailureHandler(function(error) {
      hideLoading();
      if (loadingEl) loadingEl.textContent = "جاري التحميل...";
      alert("Error: " + error.message);
    })
    .generateAndLogGenericTDS(product);
}

function generateTDS(event) {
  event.preventDefault();
  
  // 1. Confirm
  if(!confirm("Are you sure you want to generate and save this certificate?")) return;

  // 2. Gather Data
  const data = {
    productName: tdsDetails.product,
    batchNumber: document.getElementById('tdsBatch').value,
    prodDate: document.getElementById('tdsDate').value,
    expDate: document.getElementById('tdsExpDate').value,
    acidity: document.getElementById('tdsAcidity').value,
    oxidation: document.getElementById('tdsOxidation').value,
    ph: document.getElementById('tdspH').value
  };
  
  // 3. Show Loading (Safely)
  showLoading();
  var loadingEl = document.getElementById('loadingText');
  if (loadingEl) {
    loadingEl.textContent = "Generating PDF & Saving to Drive...";
  }
  
  // 4. Call Server
  google.script.run
    .withSuccessHandler(function(result) {
      hideLoading();
      
      // Reset loading text
      if (loadingEl) loadingEl.textContent = "جاري التحميل...";

      // Show Success Message with Link
      const container = document.getElementById('tdsFormCard');
      container.innerHTML = `
        <div class="success-msg" style="flex-direction:column; gap:15px; text-align:center;">
          <i class="fas fa-check-circle" style="font-size:3em;"></i>
          <div>
            <h3>Certificate Generated Successfully!</h3>
            <div style="background:white; color:#333; padding:5px 10px; border-radius:4px; margin:10px auto; display:inline-block; font-family:monospace;">
              ${result.documentId}
            </div>
          </div>
          <a href="${result.url}" target="_blank" class="btn btn-primary" style="text-decoration:none; color:white;">
            <i class="fas fa-file-pdf"></i> Open PDF Certificate
          </a>
          <button onclick="resetTDSForm()" class="btn btn-secondary">
            <i class="fas fa-plus"></i> Create Another
          </button>
        </div>
      `;
      
    })
    .withFailureHandler(function(error) {
      hideLoading();
      if (loadingEl) loadingEl.textContent = "جاري التحميل...";
      alert("Error: " + error.message);
    })
    .generateAndLogTDS(data);
}

function resetTDSForm() {
  // Reload the portal to reset state
  showPortal('TDS');
}

function printTDS() {
  window.print();
}

function resetTDS() {
  document.getElementById('tdsCertificate').style.display = 'none';
  document.getElementById('tdsFormCard').style.display = 'block';
  document.getElementById('tdsForm').reset();
}
</script>

<template id="portalTDSTemplate">
  <div class="portal-container">
    <div class="portal-header">
      <div class="portal-title">
        <i class="fas fa-file-contract"></i>
        <span>إصدار شهادة تحليل (TDS)</span>
      </div>
      <button class="btn-back" onclick="goHome()">
        <i class="fas fa-arrow-right"></i>
        <span>العودة</span>
      </button>
    </div>
    
    <div class="portal-body">
      
      <div id="tdsFormCard">
        <form id="tdsForm" onsubmit="generateTDS(event)">
          <div class="form-group">
            <label class="form-label"><i class="fas fa-flask"></i> المنتج</label>
            <select id="tdsProductSelect" class="form-control" onchange="loadTDSDetails()" required></select>
          </div>
          
          <div class="form-group">
            <label class="form-label"><i class="fas fa-barcode"></i> رقم التشغيلة (Batch No)</label>
            <input type="text" id="tdsBatch" class="form-control" required placeholder="e.g., 2026-001">
          </div>
          
          <div class="form-group" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div>
              <label class="form-label">تاريخ الإنتاج</label>
              <input type="date" id="tdsDate" class="form-control" required onchange="calculateExpiry()">
            </div>
            <div>
              <label class="form-label">تاريخ الانتهاء</label>
              <input type="date" id="tdsExpDate" class="form-control" required>
            </div>
          </div>
          
          <div class="info-card">
            <div class="info-card-header"><i class="fas fa-vial"></i> نتائج التحليل</div>
            <div class="info-card-body">
              <div class="form-group">
                <label class="form-label">Total Acidity %</label>
                <input type="number" id="tdsAcidity" class="form-control" step="0.01" required placeholder="e.g., 5.10">
              </div>
              <div class="form-group">
                <label class="form-label">Oxidation Value</label>
                <input type="number" id="tdsOxidation" class="form-control" step="1" required placeholder="e.g., 550">
              </div>
              <div class="form-group">
                <label class="form-label">pH Value</label>
                <input type="number" id="tdspH" class="form-control" step="0.01" required placeholder="e.g., 2.60">
              </div>
            </div>
          </div>
          
          <div class="button-group" style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">
              <i class="fas fa-file-pdf"></i>
              <span>إصدار شهادة (Batch)</span>
            </button>
            
            <button type="button" class="btn btn-secondary" style="flex: 1; background-color: #64748b;" onclick="generateGenericSpec()">
              <i class="fas fa-file-alt"></i>
              <span>مواصفة فنية (Generic)</span>
            </button>
          </div>
        </form>
      </div>
      
    </div>
  </div>
</template>
