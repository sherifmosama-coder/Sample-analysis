<!-- Portal A Template -->
<template id="portalATemplate">
  <div class="portal-container portal-a-dark">
    <div class="portal-header">
      <div class="portal-title">
        <i class="fas fa-cogs"></i>
        <span>ارسال تانك</span>
      </div>
      <button class="btn-back" onclick="goHome()">
        <i class="fas fa-arrow-right"></i>
        <span>العودة</span>
      </button>
    </div>

    <div class="portal-body">
      <div id="successMsg" class="success-msg" style="display: none;">
        <i class="fas fa-check-circle"></i>
        <span>تم حفظ البيانات بنجاح</span>
      </div>

      <form id="formA" onsubmit="submitFormA(event)">
        <div class="form-group">
          <label class="form-label">
            <i class="fas fa-box"></i> نوع الخامة *
          </label>
          <div id="materialBtns" class="toggle-group"></div>
        </div>

        <div id="preparationGroup" class="form-group" style="display: none;">
          <label class="form-label">
            <i class="fas fa-cog"></i> طريقة التحضير *
          </label>
          <div id="preparationBtns" class="toggle-group">
            <button type="button" class="toggle-btn" data-value="100">100</button>
            <button type="button" class="toggle-btn" data-value="50">50</button>
            <button type="button" class="toggle-btn" data-value="1">1</button>
            <button type="button" class="toggle-btn" data-value="2">2</button>
            <button type="button" class="toggle-btn" data-value="3">3</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">
            <i class="fas fa-hashtag"></i> العدد *
          </label>
          <input type="number" id="quantity" class="form-control" placeholder="1" min="1" step="1" inputmode="numeric" required>
        </div>

        <div class="form-group">
          <label class="form-label">
            <i class="fas fa-gauge"></i> قراءات الجهاز *
          </label>
          <div class="readings-group">
            <div class="reading-input-wrapper">
              <label class="reading-label">قراءة 1</label>
              <input type="text" id="deviceReading1" class="form-control reading-input" placeholder="0.00" inputmode="decimal" onblur="calculateAverageA()">
            </div>
            <div class="reading-input-wrapper">
              <label class="reading-label">قراءة 2</label>
              <input type="text" id="deviceReading2" class="form-control reading-input" placeholder="0.00" inputmode="decimal" onblur="calculateAverageA()">
            </div>
            <div class="reading-input-wrapper">
              <label class="reading-label">قراءة 3</label>
              <input type="text" id="deviceReading3" class="form-control reading-input" placeholder="0.00" inputmode="decimal" onblur="calculateAverageA()">
            </div>
          </div>
          <small class="form-hint">أدخل قراءة واحدة على الأقل - القراءات أقل من 10 سيتم تحويلها تلقائياً</small>
          <div id="averageDisplayA" class="average-display" style="display: none;">
            <i class="fas fa-calculator"></i>
            <span>المتوسط: <strong id="averageValueA">0.00</strong> pH</span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">
            <i class="fas fa-barcode"></i> رقم العينة *
          </label>
          <input type="number" id="serialNum" class="form-control" placeholder="رقم تسلسلي" min="1" step="1" inputmode="numeric" required>
          <div id="serialError" class="error-msg" style="display: none;">
            <i class="fas fa-exclamation-circle"></i>
            <span></span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">
            <i class="fas fa-calculator"></i> v/v%
          </label>
          <input type="text" id="vvPercent" class="form-control readonly-field" readonly placeholder="سيتم الحساب تلقائياً">
        </div>

        <div class="button-group">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i>
            <span>حفظ</span>
          </button>
          <button type="button" class="btn btn-secondary" onclick="goHome()">
            <i class="fas fa-times"></i>
            <span>إلغاء</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</template>

<!-- Portal B Template -->
<template id="portalBTemplate">
  <div class="portal-container">
    <div class="portal-header">
      <div class="portal-title">
        <i class="fas fa-flask"></i>
        <span>تحليل عينة</span>
      </div>
      <button class="btn-back" onclick="goHome()">
        <i class="fas fa-arrow-right"></i>
        <span>العودة</span>
      </button>
    </div>
    <div class="portal-body">
      <div id="successMsgB" class="success-msg" style="display: none;">
        <i class="fas fa-check-circle"></i>
        <span>تم حفظ البيانات بنجاح</span>
      </div>

      <form id="formB" onsubmit="submitFormB(event)">
        <div class="form-group">
          <label class="form-label">
            <i class="fas fa-vial"></i> نوع العينة *
          </label>
          <div class="toggle-group">
            <button type="button" class="toggle-btn" data-sample-type="product" onclick="selectSampleType('product')">عينة من منتج</button>
            <button type="button" class="toggle-btn" data-sample-type="tank" onclick="selectSampleType('tank')">تانك</button>
          </div>
        </div>

        <div id="tankPath" style="display: none;">
          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-barcode"></i> رقم العينة *
            </label>
            <select id="tankSerial" class="form-control" onchange="loadTankInfo()">
              <option value="">-- اختر رقم العينة --</option>
            </select>
          </div>

          <div id="tankInfoCard" class="info-card" style="display: none;">
            <div class="info-card-header">
              <i class="fas fa-info-circle"></i>
              <span>معلومات التانك</span>
            </div>
            <div class="info-card-body">
              <div class="info-row">
                <span class="info-label">التاريخ:</span>
                <span id="tankDate" class="info-value"></span>
              </div>
              <div class="info-row">
                <span class="info-label">قراءة الجهاز 1:</span>
                <span id="tankReading1" class="info-value"></span>
              </div>
              <div class="info-row">
                <span class="info-label">النسبة المئوية:</span>
                <span id="tankPercent" class="info-value"></span>
              </div>
            </div>
          </div>

          <div id="previousAnalysisTip" class="previous-analysis-tip" style="display: none;">
            <div id="previousAnalysisTipContent"></div>
          </div>
        </div>

        <div id="productPath" style="display: none;">
          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-bottle-droplet"></i> اسم المنتج *
            </label>
            <select id="productName" class="form-control">
              <option value="">-- اختر المنتج --</option>
            </select>
          </div>
        </div>

        <div id="commonFields" style="display: none;">
          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-microscope"></i> طريقة التحليل *
            </label>
            <div class="toggle-group">
              <button type="button" class="toggle-btn" data-analysis-method="device" onclick="selectAnalysisMethod('device')">الجهاز</button>
              <button type="button" class="toggle-btn" data-analysis-method="lab" onclick="selectAnalysisMethod('lab')">معملي</button>
            </div>
          </div>

          <div class="form-group" id="deviceReadingsGroup" style="display: none;">
            <label class="form-label">
              <i class="fas fa-gauge"></i> قراءات الجهاز *
            </label>
            <div class="readings-group">
              <div class="reading-input-wrapper">
                <label class="reading-label">قراءة 1</label>
                <input type="text" id="deviceReadingB1" class="form-control reading-input" placeholder="0.00" inputmode="decimal" onblur="calculateAverageB()">
              </div>
              <div class="reading-input-wrapper">
                <label class="reading-label">قراءة 2</label>
                <input type="text" id="deviceReadingB2" class="form-control reading-input" placeholder="0.00" inputmode="decimal" onblur="calculateAverageB()">
              </div>
              <div class="reading-input-wrapper">
                <label class="reading-label">قراءة 3</label>
                <input type="text" id="deviceReadingB3" class="form-control reading-input" placeholder="0.00" inputmode="decimal" onblur="calculateAverageB()">
              </div>
            </div>
            <small class="form-hint">أدخل قراءة واحدة على الأقل - القراءات أقل من 10 سيتم تحويلها تلقائياً</small>
            <div id="averageDisplayB" class="average-display" style="display: none;">
              <i class="fas fa-calculator"></i>
              <span>المتوسط: <strong id="averageValueB">0.00</strong> pH</span>
            </div>
            <div id="calculatedVV" class="calculated-display" style="display: none;">
              <i class="fas fa-calculator"></i>
              <span>v/v%: <strong id="vvValue">0.00</strong></span>
            </div>
          </div>

          <div class="form-group" id="labResultGroup" style="display: none;">
            <label class="form-label">
              <i class="fas fa-chart-line"></i> نتيجة التحليل المعملي *
            </label>
            <div class="input-with-suffix">
              <input type="text" id="labResult" class="form-control" placeholder="0.00" inputmode="decimal">
              <span class="input-suffix">%</span>
            </div>
          </div>

          <div id="productOnlyFields" style="display: none;">
            <div class="form-group">
              <label class="form-label">
                <i class="fas fa-hashtag"></i> رقم التشغيلة *
              </label>
              <input type="text" id="refNumber" class="form-control" placeholder="رقم التشغيلة">
            </div>

            <div class="form-group">
              <label class="form-label">
                <i class="fas fa-camera"></i> صورة العينة
              </label>
              <div class="image-upload-area">
                <input type="file" id="imageInput" accept="image/*" capture="environment" style="display: none;" onchange="previewImage(event)">
                <button type="button" class="btn-upload" onclick="document.getElementById('imageInput').click()">
                  <i class="fas fa-camera"></i>
                  <span>التقاط أو رفع صورة</span>
                </button>
                <div id="imagePreview" class="image-preview" style="display: none;">
                  <img id="previewImg" src="" alt="Preview">
                  <div class="image-actions">
                    <button type="button" class="btn btn-sm btn-success" onclick="confirmImage()">
                      <i class="fas fa-check"></i> تأكيد
                    </button>
                    <button type="button" class="btn btn-sm btn-secondary" onclick="reuploadImage()">
                      <i class="fas fa-redo"></i> إعادة رفع
                    </button>
                  </div>
                </div>
                <div id="uploadedImageInfo" class="uploaded-info" style="display: none;">
                  <i class="fas fa-check-circle"></i>
                  <span>تم رفع الصورة بنجاح</span>
                </div>
              </div>
            </div>
          </div>

          <div class="button-group">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-save"></i>
              <span>حفظ</span>
            </button>
            <button type="button" class="btn btn-secondary" onclick="goHome()">
              <i class="fas fa-times"></i>
              <span>إلغاء</span>
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</template>

<!-- Portal C Template - NO CHANGES -->
<template id="portalCTemplate">
  <div class="portal-container portal-c-wide">
    <div class="portal-header">
      <div class="portal-title">
        <i class="fas fa-chart-bar"></i>
        <span>التقارير</span>
      </div>
      <button class="btn-back" onclick="goHome()">
        <i class="fas fa-arrow-right"></i>
        <span>العودة</span>
      </button>
    </div>
    
    <div class="portal-body">
      <div class="form-group">
        <label class="form-label">
          <i class="fas fa-file-alt"></i> نوع التقرير
        </label>
        <div class="toggle-group" style="grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));">
          <button type="button" class="toggle-btn" onclick="selectReportTypeC('tank')">
            <i class="fas fa-fill-drip"></i> التانكات
          </button>
          <button type="button" class="toggle-btn" onclick="selectReportTypeC('analysis')">
            <i class="fas fa-microscope"></i> التحليلات
          </button>
          <button type="button" class="toggle-btn" onclick="selectReportTypeC('executive')">
            <i class="fas fa-chart-pie"></i> أداء الإنتاج
          </button>
        </div>
      </div>

      <div id="filtersSection" class="filters-card" style="display: none;">
        <div class="filters-header">
          <i class="fas fa-filter"></i>
          <span>الفلاتر والبحث</span>
        </div>
        
        <div class="filters-body">
          <div class="filter-row">
            <div class="filter-group">
              <label class="filter-label">من تاريخ</label>
              <input type="date" id="startDateC" class="form-control">
            </div>
            <div class="filter-group">
              <label class="filter-label">إلى تاريخ</label>
              <input type="date" id="endDateC" class="form-control">
            </div>
          </div>

          <div class="filter-row quick-date-btns">
            <button class="btn btn-secondary btn-filter" onclick="setTodayDate()">
              <i class="fas fa-calendar-day"></i>
              <span>اليوم</span>
            </button>
            <button class="btn btn-secondary btn-filter" onclick="setWeekDate()">
              <i class="fas fa-calendar-week"></i>
              <span>هذا الأسبوع</span>
            </button>
            <button class="btn btn-secondary btn-filter" onclick="setMonthDate()">
              <i class="fas fa-calendar-alt"></i>
              <span>هذا الشهر</span>
            </button>
          </div>

          <div class="filter-row">
            <div class="search-box-wrapper">
              <i class="fas fa-search search-icon"></i>
              <input type="text" id="searchInput" class="form-control search-input" 
                     placeholder="ابحث في التقرير..." 
                     onkeyup="filterTable()">
              <button class="btn-clear-search" id="clearSearchBtn" onclick="clearSearch()" style="display: none;">
                <i class="fas fa-times"></i>
              </button>
            </div>
          </div>

          <div class="filter-row action-btns">
            <button class="btn btn-primary" onclick="loadReportData()">
              <i class="fas fa-sync-alt"></i>
              <span>تحميل البيانات</span>
            </button>
            <button class="btn btn-secondary" onclick="resetFilters()">
              <i class="fas fa-redo"></i>
              <span>إعادة تعيين</span>
            </button>
          </div>
        </div>
      </div>

      <div id="reportDisplayC" style="display: none;">
        <div id="summaryStats" class="summary-stats"></div>

        <div class="export-buttons">
          <button class="btn btn-success" onclick="exportToExcelC()">
            <i class="fas fa-file-excel"></i>
            <span>تصدير Excel</span>
          </button>
          <button class="btn btn-secondary" onclick="printReport()">
            <i class="fas fa-print"></i>
            <span>طباعة</span>
          </button>
        </div>

        <div class="report-table-container">
          <table id="reportTable" class="report-table">
            <thead id="reportTableHead"></thead>
            <tbody id="reportTableBody"></tbody>
          </table>
          
          <div id="noDataMessage" class="no-data-message" style="display: none;">
            <i class="fas fa-inbox"></i>
            <p>لا توجد بيانات للفترة المحددة</p>
          </div>
        </div>
      </div>

      <div id="executiveReportSection" style="display: none;" class="mt-4">
         <div class="bg-white p-4 rounded-xl shadow-sm mb-6 border border-gray-100" style="box-shadow: 0 4px 15px rgba(0,0,0,0.03);">
            <h3 class="text-sm font-bold text-gray-600 mb-4"><i class="fas fa-filter ml-2 text-blue-500"></i>لوحة التحكم والفلترة</h3>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4 items-end">
               <div>
                  <label class="block text-xs font-bold text-gray-500 mb-1">من تاريخ</label>
                  <input type="date" id="repStartDate" class="w-full border border-gray-300 rounded p-2 text-sm bg-white text-gray-800">
               </div>
               <div>
                  <label class="block text-xs font-bold text-gray-500 mb-1">إلى تاريخ</label>
                  <input type="date" id="repEndDate" class="w-full border border-gray-300 rounded p-2 text-sm bg-white text-gray-800">
               </div>
               <div>
                  <label class="block text-xs font-bold text-gray-500 mb-1">المنتج</label>
                  <select id="repProduct" class="w-full border border-gray-300 rounded p-2 text-sm bg-white text-gray-800"><option value="الكل">الكل</option></select>
               </div>
               <div>
                  <label class="block text-xs font-bold text-gray-500 mb-1">المستخدم / المشغل</label>
                  <select id="repUser" class="w-full border border-gray-300 rounded p-2 text-sm bg-white text-gray-800"><option value="الكل">الكل</option></select>
               </div>
               <div>
                  <button onclick="loadExecutiveReport()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow transition border-none"><i class="fas fa-sync-alt ml-2"></i>تحديث التقرير</button>
               </div>
            </div>
         </div>

         <div class="flex flex-wrap md:flex-nowrap gap-3 mb-6 w-full">
            <div class="flex-1 min-w-[130px] bg-white p-3 rounded-lg border-[3px] border-green-600 flex flex-col gap-1 shadow-sm">
               <div class="flex items-center justify-between mb-1">
                  <span class="text-sm font-black text-gray-800">إجمالي الإنتاج</span>
                  <i class="fas fa-industry text-green-500 text-[11px]"></i>
               </div>
               <span id="repKpiProd" class="text-base font-black text-gray-800 mt-auto">0 د</span>
            </div>
            <div class="flex-1 min-w-[130px] bg-white p-3 rounded-lg border-[3px] border-red-500 flex flex-col gap-1 shadow-sm">
               <div class="flex items-center justify-between mb-1">
                  <span class="text-sm font-black text-gray-800">إجمالي المهدر</span>
                  <i class="fas fa-exclamation-triangle text-red-500 text-[11px]"></i>
               </div>
               <span id="repKpiWaste" class="text-base font-black text-gray-800 mt-auto">0 د</span>
            </div>
            <div class="flex-1 min-w-[130px] bg-white p-3 rounded-lg border-[3px] border-amber-400 flex flex-col gap-1 shadow-sm">
               <div class="flex items-center justify-between mb-1">
                  <span class="text-sm font-black text-gray-800">وقت الراحة</span>
                  <i class="fas fa-mug-hot text-amber-500 text-[11px]"></i>
               </div>
               <span id="repKpiBreak" class="text-base font-black text-gray-800 mt-auto">0 د</span>
            </div>
            <div class="flex-1 min-w-[130px] bg-white p-3 rounded-lg border-[3px] border-purple-600 flex flex-col gap-1 shadow-sm">
               <div class="flex items-center justify-between mb-1">
                  <span class="text-sm font-black text-gray-800">وقت إضافي</span>
                  <i class="fas fa-clock text-purple-500 text-[11px]"></i>
               </div>
               <span id="repKpiOt" class="text-base font-black text-gray-800 mt-auto">0 د</span>
            </div>
            <div class="flex-1 min-w-[130px] bg-gradient-to-br from-blue-50 to-blue-100 p-3 rounded-lg border-[3px] border-blue-800 flex flex-col gap-1 shadow-sm">
               <div class="flex items-center justify-between mb-1">
                  <span class="text-sm font-black text-blue-900">كفاءة الوقت</span>
                  <i class="fas fa-tachometer-alt text-blue-700 text-[11px]"></i>
               </div>
               <span id="repKpiOee" class="text-xl font-black text-blue-800 mt-auto">0%</span>
            </div>
         </div>

         <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 lg:col-span-1 flex flex-col items-center">
               <h3 class="text-sm font-bold text-gray-600 w-full mb-2 border-b pb-2">توزيع الأوقات</h3>
               <div class="w-full max-w-[250px] aspect-square relative">
                  <canvas id="repDoughnutChart"></canvas>
               </div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 lg:col-span-2">
               <h3 class="text-sm font-bold text-gray-600 w-full mb-2 border-b pb-2">المنحنى الزمني (يومياً)</h3>
               <div class="w-full h-64 relative">
                  <canvas id="repTrendChart"></canvas>
               </div>
            </div>
         </div>

         <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-4 border-b border-gray-100 bg-gray-50">
               <h3 class="text-sm font-bold text-gray-600 mb-0"><i class="fas fa-list ml-2 text-blue-500"></i>تفصيل الأداء حسب المنتج</h3>
            </div>
            <div class="overflow-x-auto">
               <table class="w-full text-sm text-right text-gray-500">
                  <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                     <tr>
                        <th scope="col" class="px-6 py-3 border-l border-gray-200">المنتج</th>
                        <th scope="col" class="px-6 py-3 border-l border-gray-200 text-center">إجمالي الكمية</th>
                        <th scope="col" class="px-6 py-3 border-l border-gray-200 text-center">الوقت المستغرق</th>
                        <th scope="col" class="px-6 py-3 text-center bg-blue-50">المتوسط (دقيقة/وحدة)</th>
                     </tr>
                  </thead>
                  <tbody id="repProductTable" class="divide-y divide-gray-200 bg-white">
                     <tr><td colspan="4" class="px-6 py-10 text-center text-gray-400">جاري تحميل البيانات...</td></tr>
                  </tbody>
               </table>
            </div>
         </div>
      </div>
      </div>
  </div>
</template>

<template id="portalProdTemplate">
  <div class="portal-container">
    <div class="portal-header">
      <div class="portal-title">
        <i class="fas fa-industry"></i>
        <span>متابعة الإنتاج</span>
      </div>
      <button class="btn-back" onclick="goHome()">
        <i class="fas fa-arrow-right"></i>
        <span>العودة</span>
      </button>
    </div>
    
    <div class="portal-body" style="padding-top: 10px;">
      <div class="flex flex-wrap md:flex-nowrap gap-3 mb-6 w-full">
         <div class="flex-1 min-w-[130px] bg-white p-3 rounded-lg border-[3px] border-blue-900 flex flex-col gap-1 shadow-sm">
            <div class="flex items-center justify-between mb-1">
               <span class="text-sm font-black text-gray-800">بداية الوردية</span>

<script>
  // Production Portal functions
  var prodDataList = [];
  var uploadedProdImage = null;

  function initPortalProd() {
    showLoading();
    google.script.run
      .withSuccessHandler(function(res) {
        hideLoading();
        const sel = document.getElementById('prodSelect');
        sel.innerHTML = '<option value="">-- اختر المنتج --</option>';
        res.products.forEach(function(p) {
          let opt = document.createElement('option');
          opt.value = p; opt.textContent = p;
          sel.appendChild(opt);
        });
        loadProdSessions();
      })
      .withFailureHandler(function(e) { hideLoading(); alert(e.message); })
      .getProdSetup();
  }

  function loadProdSessions() {
    document.getElementById('activeSessionsList').innerHTML = '<div class="dashboard-loading"><i class="fas fa-spinner fa-spin"></i><span>جاري التحميل...</span></div>';
    google.script.run
      .withSuccessHandler(function(data) {
        prodDataList = data || [];
        renderProdSessions();
      })
      .withFailureHandler(function(e) { alert(e.message); })
      .getTodayProdSessions();
  }

  function formatDuration(mins) {
    if (!mins) return '0 د';
    let h = Math.floor(mins / 60);
    let m = mins % 60;
    if (h > 0 && m > 0) return h + ' س و ' + m + ' د';
    if (h > 0) return h + ' س';
    return m + ' د';
  }

  function getMins(t) {
    if(!t) return 0;
    let p = String(t).split(':');
    return parseInt(p[0]||0)*60 + parseInt(p[1]||0);
  }
  
  function getHM(m) {
    let h = Math.floor(m/60); let mn = m%60;
    return (h<10?'0':'')+h+':'+(mn<10?'0':'')+mn;
  }

  function renderProdSessions() {
    const activeList = document.getElementById('activeSessionsList');
    const historyList = document.getElementById('historySessionsList');
    activeList.innerHTML = ''; historyList.innerHTML = '';
    
    let hasActive = false; let hasHistory = false;
    let nowMins = getMins(new Date().toTimeString().substring(0,5));
    
    // KPI Data Gathering
    let actualStart = 1440; let actualEnd = 0;
    let totalProd = 0; let totalBreak = 0; let totalWaste = 0;
    let prodBreakdown = {};

    // 1. Collect Break Intervals to subtract from Production Sessions
    let breakIntervals = [];
    prodDataList.forEach(function(s) {
      if (s.product === 'وقت الراحة') {
        let sM = getMins(s.startTime);
        let eM = s.status === 'Active' ? nowMins : getMins(s.endTime);
        let dur = eM - sM; if(dur < 0) dur += 1440;
        breakIntervals.push({start: sM, end: sM + dur});
      }
    });

    prodDataList.forEach(function(s) {
      let sM = getMins(s.startTime);
      let eM = s.status === 'Active' ? nowMins : getMins(s.endTime);
      let dur = eM - sM; if(dur < 0) dur += 1440;
      let absEM = sM + dur;
      
      if(sM < actualStart) actualStart = sM;
      if(eM > actualEnd) actualEnd = eM;

      if (s.product === 'وقت مهدر') {
        totalWaste += dur;
      } else if (s.product === 'وقت الراحة') {
        totalBreak += dur;
      } else {
        // Subtract overlapping breaks for Net Production Time
        let netDur = dur;
        breakIntervals.forEach(b => {
           let overlapStart = Math.max(sM, b.start);
           let overlapEnd = Math.min(absEM, b.end);
           if (overlapStart < overlapEnd) netDur -= (overlapEnd - overlapStart);
        });
        totalProd += netDur;
        prodBreakdown[s.product] = (prodBreakdown[s.product] || 0) + netDur;
        s.netDuration = netDur; // Save net duration for UI chips
      }
    });

    // Make-Up & Overtime Logic
    let shiftStart = (prodDataList.length > 0 && actualStart < 480) ? actualStart : 480;
    let shiftEnd = shiftStart + 510; // +8.5 hours
    let deficit = (prodDataList.length > 0 && actualStart > 480) ? actualStart - 480 : 0;
    
    let extraMins = actualEnd > shiftEnd ? actualEnd - shiftEnd : 0;
    let compMins = Math.min(deficit, extraMins); // Flex-Time logic
    let overtimeMins = extraMins - compMins;

    // Update Scorecards with Formatted Durations and Variations
    let actualStartDisplay = (actualStart === 1440) ? 480 : actualStart;
    let actualEndDisplay = (actualEnd === 0) ? 990 : actualEnd;

    document.getElementById('kpiShiftStart').textContent = getHM(actualStartDisplay);
    let startVar = actualStartDisplay - 480;
    let elStartVar = document.getElementById('kpiShiftStartVar');
    if (startVar > 0) { elStartVar.textContent = `(تأخير ${formatDuration(startVar)})`; elStartVar.className = "text-[10px] text-red-500 font-bold"; }
    else if (startVar < 0) { elStartVar.textContent = `(مبكر ${formatDuration(Math.abs(startVar))})`; elStartVar.className = "text-[10px] text-green-500 font-bold"; }
    else { elStartVar.textContent = ''; }

    document.getElementById('kpiShiftEnd').textContent = getHM(actualEndDisplay);
    let endVar = actualEndDisplay - 990;
    let elEndVar = document.getElementById('kpiShiftEndVar');
    if (endVar > 0) { elEndVar.textContent = `(+ ${formatDuration(endVar)})`; elEndVar.className = "text-[10px] text-purple-500 font-bold"; }
    else if (endVar < 0) { elEndVar.textContent = `(- ${formatDuration(Math.abs(endVar))})`; elEndVar.className = "text-[10px] text-gray-400 font-bold"; }
    else { elEndVar.textContent = ''; }

    document.getElementById('kpiProdTotal').textContent = formatDuration(totalProd);
    document.getElementById('kpiBreakTotal').textContent = formatDuration(totalBreak);
    document.getElementById('kpiWasteTotal').textContent = formatDuration(totalWaste);
    
    const otCard = document.getElementById('kpiOvertimeCard');
    if (overtimeMins > 0 || compMins > 0) {
      otCard.classList.remove('hidden');
      otCard.classList.add('flex');
      document.getElementById('kpiOvertimeTotal').textContent = formatDuration(overtimeMins);
    } else {
      otCard.classList.add('hidden');
      otCard.classList.remove('flex');
    }

    // Render RTL Timeline & Lanes
    let tlStart = shiftStart;
    let tlEnd = Math.max(shiftEnd, actualEnd);
    let tlSpan = tlEnd - tlStart; if(tlSpan === 0) tlSpan = 1;
    
    let tlHTML = '';
    let chipsHTML = '';
    let placedSessions = [];
    let transitions = new Set([tlStart, tlEnd, nowMins]);
    
    function getLane(startM, endM) {
      let lane = 0;
      let overlapping = true;
      while(overlapping) {
        overlapping = false;
        for(let i=0; i<placedSessions.length; i++) {
           if(placedSessions[i].lane === lane) {
              if(Math.max(startM, placedSessions[i].start) < Math.min(endM, placedSessions[i].end)) {
                 overlapping = true; lane++; break;
              }
           }
        }
      }
      placedSessions.push({start: startM, end: endM, lane: lane});
      return lane;
    }

    prodDataList.forEach(function(s) {
      let sM = getMins(s.startTime);
      let eM = s.status === 'Active' ? nowMins : getMins(s.endTime);
      let dur = eM - sM; if(dur < 0) dur += 1440;
      let absEM = sM + dur;
      
      transitions.add(sM);
      transitions.add(eM);
      
      let lane = getLane(sM, absEM);
      let topPx = lane * 30; // 30px height per lane
      let rightPct = ((sM - tlStart) / tlSpan) * 100;
      let widthPct = (dur / tlSpan) * 100;
      
      let bg = 'bg-blue-500';
      let clickableStr = `cursor-pointer`;
      let onclickStr = `onclick="openEditModal('${s.id}')"`;
      
      if (s.product === 'وقت مهدر') {
         bg = 'bg-red-500';
         clickableStr = ''; 
         onclickStr = '';
      } else if (s.product === 'وقت الراحة') {
         bg = 'bg-yellow-400';
      }
      
      // Inject lane-based session block
      tlHTML += `<div class="absolute opacity-75 hover:opacity-100 transition-opacity ${bg} ${clickableStr}" style="right:${rightPct}%; width:${widthPct}%; top:${topPx}px; height: 26px; border-right: 1px solid rgba(255,255,255,0.3); border-radius: 4px;" title="${s.product}" ${onclickStr}></div>`;
      
      // Active floating buttons
      if (s.status === 'Active') {
         let icon = (s.product === 'وقت الراحة') ? 'fa-stop-circle' : 'fa-flag-checkered';
         let label = (s.product === 'وقت الراحة') ? 'إنهاء الراحة' : 'إنهاء';
         let onclickAction = (s.product === 'وقت الراحة') ? `openEndBreakModal('${s.id}')` : `openEndModal('${s.id}')`;
         let color = (s.product === 'وقت الراحة') ? 'bg-amber-100 text-amber-800 border-amber-400' : 'bg-blue-100 text-blue-800 border-blue-400';

         tlHTML += `<div class="absolute flex justify-center items-center z-50 pointer-events-none" style="right:${rightPct}%; width:${widthPct}%; top:${topPx - 25}px; min-width: 60px;">
            <button onclick="${onclickAction}" class="pointer-events-auto ${color} text-[9px] font-bold px-2 py-0.5 rounded shadow-sm whitespace-nowrap transition-transform hover:scale-105 cursor-pointer">
               <i class="fas ${icon} mr-1"></i> ${label}
            </button>
         </div>`;
      }
      
      // Chip text perfectly overlaid inside the colored block
      if (s.product !== 'وقت مهدر' && widthPct > 5) {
         let durText = (s.netDuration !== undefined) ? formatDuration(s.netDuration) : formatDuration(dur);
         tlHTML += `<div class="absolute flex items-center text-[10px] font-bold text-white z-20 pointer-events-none px-2" style="right:${rightPct}%; top:${topPx}px; height: 26px; width:${widthPct}%; overflow:hidden;">
           <span class="truncate drop-shadow-md">${s.product} (${durText})</span>
         </div>`;
      }
    });

    if (compMins > 0) {
      transitions.add(shiftEnd);
      let cRight = ((shiftEnd - tlStart) / tlSpan) * 100;
      let cWidth = (compMins / tlSpan) * 100;
      tlHTML += `<div class="absolute h-full opacity-80 bg-orange-400" style="right:${cRight}%; width:${cWidth}%; border-right: 1px solid rgba(255,255,255,0.3);" title="تعويض تأخير"></div>`;
    }
    if (overtimeMins > 0) {
      transitions.add(shiftEnd + compMins);
      let oRight = (((shiftEnd + compMins) - tlStart) / tlSpan) * 100;
      let oWidth = (overtimeMins / tlSpan) * 100;
      tlHTML += `<div class="absolute h-full opacity-80 bg-purple-500" style="right:${oRight}%; width:${oWidth}%; border-right: 1px solid rgba(255,255,255,0.3);" title="وقت إضافي"></div>`;
    }

    let maxLane = placedSessions.length > 0 ? Math.max(...placedSessions.map(c => c.lane)) : 0;
    let visualTimelineHeight = ((maxLane + 1) * 30);
    
    // Convert Timeline to dynamic height block instead of fixed pill
    let vtl = document.getElementById('visualTimeline');
    vtl.style.height = visualTimelineHeight + 'px';
    vtl.classList.remove('rounded-full', 'h-6', 'overflow-hidden'); 
    vtl.classList.add('rounded-xl');

    // Sync transitions container height so bottom/top placements align perfectly with the dynamic timeline height
    let transContainer = document.getElementById('timelineTransitions');
    transContainer.style.height = visualTimelineHeight + 'px';

    // Draw Alternating Dotted Lines for Transitions
    let transHTML = '';
    let transArray = Array.from(transitions).filter(m => m >= tlStart && m <= tlEnd && m !== nowMins).sort((a,b) => a - b);
    
    transArray.forEach((m, idx) => {
      let rPct = ((m - tlStart) / tlSpan) * 100;
      let isUp = (idx % 2 === 0);
      
      if (isUp) {
        transHTML += `<div class="absolute bottom-full border-r border-dashed border-gray-400 flex flex-col items-center" style="right:${rPct}%; height: 28px; transform: translateX(50%);">
           <span class="text-[10px] text-gray-600 font-bold bg-white px-1 absolute -top-4 rounded shadow-sm border border-gray-200 whitespace-nowrap z-10">${getHM(m)}</span>
        </div>`;
      } else {
        // Now it stretches strictly from the very bottom of the timeline downwards
        transHTML += `<div class="absolute top-full border-r border-dashed border-gray-400 flex flex-col items-center" style="right:${rPct}%; height: 28px; transform: translateX(50%);">
           <span class="text-[10px] text-gray-600 font-bold bg-white px-1 absolute -bottom-4 rounded shadow-sm border border-gray-200 whitespace-nowrap z-10">${getHM(m)}</span>
        </div>`;
      }
    });

    let nowRight = ((nowMins - tlStart) / tlSpan) * 100;
    if (nowRight >= 0 && nowRight <= 100) {
      transHTML += `<div class="absolute top-[-8px] bottom-[-8px] border-r-[3px] border-blue-600 z-30" style="right:${nowRight}%;" title="الآن ${getHM(nowMins)}">
         <div class="absolute -bottom-3 right-[50%] translate-x-[50%] w-3 h-3 bg-blue-600 rounded-full shadow"></div>
      </div>`;
    }

    document.getElementById('currentTimeHeaderTag').textContent = 'الآن ' + getHM(nowMins);
    transContainer.innerHTML = transHTML;
    vtl.innerHTML = tlHTML;
    
    // Use the old chipsContainer as a dedicated bottom spacer to prevent downward lines from clashing with the legend
    const chipsContainer = document.getElementById('timelineChipsContainer');
    chipsContainer.innerHTML = '';
    chipsContainer.style.display = 'block';
    chipsContainer.style.height = '45px';

    // Render Cards
    prodDataList.forEach(function(session) {
      const card = document.createElement('div');
      let iconHTML = '<i class="fas fa-industry"></i>';
      let cardClass = 'prod-card';
      let statusHTML = session.status === 'Active' ? '<span class="prod-status status-active">نشط</span>' : '<span class="prod-status status-completed">مكتمل</span>';
      
      if (session.product === 'وقت مهدر') {
        iconHTML = '<i class="fas fa-exclamation-triangle" style="color:#ef4444; margin-left:8px;"></i>';
        cardClass = 'prod-card card-waste';
        statusHTML = '';
      } else if (session.product === 'وقت الراحة') {
        iconHTML = '<i class="fas fa-mug-hot" style="color:#d97706; margin-left:8px;"></i>';
        cardClass = 'prod-card card-break';
        statusHTML = '';
      }

      // Display netDuration if available, otherwise fallback to raw duration string
      let displayDurText = (session.netDuration !== undefined) ? formatDuration(session.netDuration) : (session.duration ? formatDuration(session.duration) : '');

      let timeChips = '<div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px;">' +
        '<span class="time-chip chip-start"><i class="fas fa-play"></i> ' + session.startTime + '</span>' +
        (session.endTime ? '<span class="time-chip chip-end"><i class="fas fa-stop"></i> ' + session.endTime + '</span>' : '') +
        (displayDurText ? '<span class="time-chip chip-dur"><i class="fas fa-clock"></i> ' + displayDurText + '</span>' : '') +
        '</div>';

      let historyBtnHTML = session.editHistory ? 
        '<button class="btn btn-secondary btn-sm" style="width:100%; margin-top:8px; background: #f1f5f9; border:none;" onclick="toggleHistory(this)"><i class="fas fa-history"></i> سجل التعديلات <i class="fas fa-chevron-down"></i></button>' +
        '<div class="edit-history-box">' + session.editHistory + '</div>' : '';

      if (session.status === 'Active') {
        if (session.product === 'وقت الراحة') return;
        hasActive = true;
        card.className = cardClass;
        card.innerHTML = 
          '<div class="prod-card-header" style="margin-bottom:10px; padding-bottom:5px;">' +
            '<span class="prod-title">' + iconHTML + session.product + '</span>' + statusHTML +
          '</div>' +
          '<div class="prod-card-body">' + timeChips +
            '<div class="prod-detail"><span>المستخدم:</span><span>' + session.user + '</span></div>' +
            '<hr style="border:0; border-top:1px solid #e5e7eb; margin:10px 0;">' +
            '<div style="display:flex; gap:10px; margin-top:auto;">' +
              '<button class="btn btn-primary btn-sm" style="flex:2;" onclick="openEndModal(\'' + session.id + '\')"><i class="fas fa-flag-checkered"></i> إنهاء التشغيلة</button>' +
              '<button class="btn btn-secondary btn-sm" style="flex:1;" onclick="openEditModal(\'' + session.id + '\')"><i class="fas fa-edit"></i> تعديل</button>' +
            '</div>' + historyBtnHTML +
          '</div>';
        activeList.appendChild(card);
      } else {
        if (session.product === 'وقت مهدر' || session.product === 'وقت الراحة') return;
        hasHistory = true;
        card.className = cardClass;
        card.innerHTML = 
          '<div class="prod-card-header" style="margin-bottom:0; padding-bottom:10px; border-bottom:none;">' +
            '<span class="prod-title">' + iconHTML + session.product + '</span>' + statusHTML +
          '</div>' +
          '<div class="prod-card-body collapsed">' + timeChips +
            '<div class="prod-detail"><span>الكمية:</span><span>' + session.quantity + '</span></div><div class="prod-detail"><span>المتوسط:</span><span>' + session.avg + ' د/وحدة</span></div>' +
            '<div class="prod-detail"><span>بواسطة:</span><span>' + session.user + '</span></div>' +
            (session.image ? '<div class="prod-detail" style="margin-top:5px;"><button class="btn btn-secondary btn-sm" style="background:#f0f9ff; color:#0369a1; border-color:#bae6fd; width:100%;" onclick="openImagePreview(\'' + session.image + '\')"><i class="fas fa-image"></i> عرض الصورة المرفقة</button></div>' : '') +
            (session.notes ? '<div class="prod-detail" style="margin-top:5px; flex-direction:column;"><span>ملاحظات:</span><span style="font-weight:normal;">' + session.notes + '</span></div>' : '') +
            '<hr style="border:0; border-top:1px solid #e5e7eb; margin:10px 0;">' +
            '<button class="btn btn-primary btn-sm" style="width:100%;" onclick="openEditModal(\'' + session.id + '\')"><i class="fas fa-edit"></i> تعديل البيانات</button>' + historyBtnHTML +
          '</div>' +
          '<button class="card-toggle-btn" onclick="toggleCardDetails(this)"><i class="fas fa-chevron-down"></i> عرض التفاصيل</button>';
        historyList.appendChild(card);
      }
    });
    
    if(!hasActive) activeList.innerHTML = '<div style="text-align:center; color:#9ca3af; padding:30px 20px; grid-column: 1 / -1;">لا توجد تشغيلات نشطة</div>';
    if(!hasHistory) historyList.innerHTML = '<div style="text-align:center; color:#9ca3af; padding:30px 20px; grid-column: 1 / -1;">لم يتم استكمال أي تشغيلة اليوم</div>';
  }

  function openImagePreview(url) {
    let directUrl = url;
    
    // Extract the Google Drive ID safely (matches any 25+ character alphanumeric string)
    const idMatch = url.match(/[-\w]{25,}/);
    
    if (idMatch && idMatch[0]) {
      // Use the official thumbnail endpoint to bypass CORS/Cookie restrictions (w1000 sets a max width for high quality)
      directUrl = 'https://drive.google.com/thumbnail?id=' + idMatch[0] + '&sz=w1000';
    }
    
    // Set the thumbnail link as the image source, and the original viewer link for the new tab
    document.getElementById('popoverImg').src = directUrl;
    document.getElementById('btnOpenNewTab').onclick = function() { window.open(url, '_blank'); };
    document.getElementById('imagePreviewModal').style.display = 'flex';
  }

  function renderMaterialButtons(options) {
    const container = document.getElementById('materialBtns');
    container.innerHTML = '';
    
    options.forEach(function(option, index) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'toggle-btn';
      btn.setAttribute('data-value', option);
      btn.setAttribute('data-index', index + 2);
      btn.textContent = option;
      btn.onclick = function() { selectMaterial(this); };
      container.appendChild(btn);
    });
  }

  function selectMaterial(btn) {
    document.querySelectorAll('#materialBtns .toggle-btn').forEach(function(b) { 
      b.classList.remove('active');
    });
    btn.classList.add('active');
    
    selectedMaterial = btn.getAttribute('data-value');
    selectedMaterialIndex = parseInt(btn.getAttribute('data-index'));
    
    const prepGroup = document.getElementById('preparationGroup');
    if (selectedMaterialIndex === 2 || selectedMaterialIndex === 3) {
      prepGroup.style.display = 'block';
    } else {
      prepGroup.style.display = 'none';
      selectedPreparation = '';
      document.querySelectorAll('#preparationBtns .toggle-btn').forEach(function(b) { 
        b.classList.remove('active');
      });
    }
    
    // Check if material is blossom or rose
    const materialLower = selectedMaterial.toLowerCase().trim();
    const isBlossomOrRose = (materialLower === 'blossom' || materialLower === 'rose');
    
    // Get reading inputs and serial input
    const reading1 = document.getElementById('deviceReading1');
    const reading2 = document.getElementById('deviceReading2');
    const reading3 = document.getElementById('deviceReading3');
    const serialInput = document.getElementById('serialNum');
    const vvInput = document.getElementById('vvPercent');
    const averageDisplay = document.getElementById('averageDisplayA');
    
    if (isBlossomOrRose) {
      // Disable device readings
      reading1.disabled = true;
      reading2.disabled = true;
      reading3.disabled = true;
      reading1.removeAttribute('required');
      reading2.removeAttribute('required');
      reading3.removeAttribute('required');
      reading1.value = '';
      reading2.value = '';
      reading3.value = '';
      
      // Disable serial number
      serialInput.disabled = true;
      serialInput.removeAttribute('required');
      serialInput.value = '';
      
      // Clear v/v%
      vvInput.value = '';
      
      // Hide average display
      averageDisplay.style.display = 'none';
      averageReadingA = 0;
      
      // Hide serial error if shown
      document.getElementById('serialError').style.display = 'none';
      
    } else {
      // Enable device readings
      reading1.disabled = false;
      reading2.disabled = false;
      reading3.disabled = false;
      
      // Enable serial number
      serialInput.disabled = false;
      serialInput.setAttribute('required', 'required');
      
      // Clear values for fresh start
      reading1.value = '';
      reading2.value = '';
      reading3.value = '';
      serialInput.value = '';
      vvInput.value = '';
      averageDisplay.style.display = 'none';
      averageReadingA = 0;
    }
  }

  function calculateAverageA() {
    const reading1 = document.getElementById('deviceReading1').value.replace(',', '.');
    const reading2 = document.getElementById('deviceReading2').value.replace(',', '.');
    const reading3 = document.getElementById('deviceReading3').value.replace(',', '.');
    
    var readings = [];
    
    if (reading1 && !isNaN(reading1)) {
      var val1 = parseFloat(reading1);
      if (val1 >= 10) val1 = val1 / 100;
      document.getElementById('deviceReading1').value = val1.toFixed(2);
      readings.push(val1);
    }
    
    if (reading2 && !isNaN(reading2)) {
      var val2 = parseFloat(reading2);
      if (val2 >= 10) val2 = val2 / 100;
      document.getElementById('deviceReading2').value = val2.toFixed(2);
      readings.push(val2);
    }
    
    if (reading3 && !isNaN(reading3)) {
      var val3 = parseFloat(reading3);
      if (val3 >= 10) val3 = val3 / 100;
      document.getElementById('deviceReading3').value = val3.toFixed(2);
      readings.push(val3);
    }
    
    if (readings.length > 0) {
      averageReadingA = readings.reduce(function(a, b) { return a + b; }, 0) / readings.length;
      
      document.getElementById('averageValueA').textContent = averageReadingA.toFixed(2);
      document.getElementById('averageDisplayA').style.display = 'flex';
      
      showLoading();
      google.script.run
        .withSuccessHandler(function(result) {
          hideLoading();
          document.getElementById('vvPercent').value = (result * 100).toFixed(4);
        })
        .withFailureHandler(hideLoading)
        .calculateVV(averageReadingA);
    } else {
      document.getElementById('averageDisplayA').style.display = 'none';
      document.getElementById('vvPercent').value = '';
      averageReadingA = 0;
    }
  }

  function formatDateForInput(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return year + '-' + month + '-' + day;
  }

  function displaySummaryStats(data) {
    const statsContainer = document.getElementById('summaryStats');
    
    if (currentReportTypeC === 'tank') {
      const vvValues = data
        .map(function(row) { return parseFloat(row.vv); })
        .filter(function(val) { return !isNaN(val); });
      
      const avg = vvValues.length > 0 
        ? (vvValues.reduce(function(a, b) { return a + b; }, 0) / vvValues.length).toFixed(2) 
        : '0.00';
      
      const max = vvValues.length > 0 
        ? Math.max.apply(null, vvValues).toFixed(2) 
        : '0.00';
      
      const min = vvValues.length > 0 
        ? Math.min.apply(null, vvValues).toFixed(2) 
        : '0.00';
      
      statsContainer.innerHTML = 
        '<div class="stat-card">' +
        '<div class="stat-icon blue"><i class="fas fa-fill-drip"></i></div>' +
        '<div class="stat-value">' + data.length + '</div>' +
        '<div class="stat-label">إجمالي التانكات</div>' +
        '</div>' +
        '<div class="stat-card">' +
        '<div class="stat-icon green"><i class="fas fa-chart-line"></i></div>' +
        '<div class="stat-value">' + avg + '%</div>' +
        '<div class="stat-label">متوسط v/v%</div>' +
        '</div>' +
        '<div class="stat-card">' +
        '<div class="stat-icon yellow"><i class="fas fa-arrow-up"></i></div>' +
        '<div class="stat-value">' + max + '%</div>' +
        '<div class="stat-label">أعلى نسبة</div>' +
        '</div>' +
        '<div class="stat-card">' +
        '<div class="stat-icon yellow"><i class="fas fa-arrow-down"></i></div>' +
        '<div class="stat-value">' + min + '%</div>' +
        '<div class="stat-label">أقل نسبة</div>' +
        '</div>';
    } else {
      const deviceCount = data.filter(function(row) { return row.method === 'الجهاز'; }).length;

  function filterTable() {
    const searchInput = document.getElementById('searchInput');
    const searchTerm = searchInput.value.trim().toLowerCase();
    const clearBtn = document.getElementById('clearSearchBtn');
    
    clearBtn.style.display = searchTerm ? 'block' : 'none';
    
    if (!searchTerm) {
      filteredReportData = fullReportData;
      displayReport(fullReportData);
      return;
    }
    
    filteredReportData = fullReportData.filter(function(row) {
      const rowText = Object.values(row).join('|').toLowerCase();
      return rowText.includes(searchTerm);
    });
    
    displayReport(filteredReportData);
    highlightSearchTerm(searchTerm);
  }

  function highlightSearchTerm(term) {
    const tbody = document.getElementById('reportTableBody');
    const cells = tbody.getElementsByTagName('td');
    
    Array.from(cells).forEach(function(cell) {
      const text = cell.textContent;
      const lowerText = text.toLowerCase();
      const index = lowerText.indexOf(term);
      
      if (index !== -1) {
        const before = text.substring(0, index);
        const match = text.substring(index, index + term.length);
        const after = text.substring(index + term.length);
        
        cell.innerHTML = before + '<span class="highlight">' + match + '</span>' + after;
      }
    });
  }

  function clearSearch() {
    document.getElementById('searchInput').value = '';
    document.getElementById('clearSearchBtn').style.display = 'none';
    filteredReportData = fullReportData;
    displayReport(fullReportData);
  }

  }

  // --- EXECUTIVE DASHBOARD SCRIPTS ---
  function initDateFiltersC() {
    const today = new Date();
    const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
    document.getElementById('repStartDate').value = firstDay.toISOString().split('T')[0];
    document.getElementById('repEndDate').value = today.toISOString().split('T')[0];

  function loadExecutiveReport() {
    const filters = {
      startDate: document.getElementById('repStartDate').value,
      endDate: document.getElementById('repEndDate').value,
      product: document.getElementById('repProduct').value || 'الكل',
      user: document.getElementById('repUser').value || 'الكل'

    document.getElementById('repProductTable').innerHTML = '<tr><td colspan="4" class="px-6 py-10 text-center text-gray-400"><i class="fas fa-spinner fa-spin text-2xl mb-2"></i><br>جاري تحميل البيانات...</td></tr>';
    
    showLoading();
    google.script.run
      .withSuccessHandler(renderExecutiveReport)
      .withFailureHandler(e => { hideLoading(); alert("خطأ في جلب البيانات: " + e.message); })
      .getProductionReportData(filters);
  }

  function renderExecutiveReport(data) {
    hideLoading();
    // Populate Dropdowns on first load
    if (!filtersLoaded) {
      const pSelect = document.getElementById('repProduct');
      data.productNames.forEach(p => { pSelect.add(new Option(p, p)); });
      const uSelect = document.getElementById('repUser');
      data.users.forEach(u => { uSelect.add(new Option(u, u)); });
      filtersLoaded = true;
    }

    // Update KPIs
    document.getElementById('repKpiProd').textContent = formatDuration(data.kpis.prod);
    document.getElementById('repKpiWaste').textContent = formatDuration(data.kpis.waste);
    document.getElementById('repKpiBreak').textContent = formatDuration(data.kpis.break);
    document.getElementById('repKpiOt').textContent = formatDuration(data.kpis.overtime);
    
    let effTotal = data.kpis.prod + data.kpis.waste;
    let oee = effTotal > 0 ? ((data.kpis.prod / effTotal) * 100).toFixed(1) : 0;
    document.getElementById('repKpiOee').textContent = oee + '%';

    // Render Table
    let tbHtml = '';
    if (data.products.length === 0) {
       tbHtml = '<tr><td colspan="4" class="px-6 py-8 text-center text-gray-400">لا توجد بيانات لهذه الفترة</td></tr>';
    } else {
       data.products.forEach(p => {
         tbHtml += `<tr class="hover:bg-gray-50 transition">
            <td class="px-6 py-3 font-bold text-gray-700 border-l border-gray-100">${p.name}</td>
            <td class="px-6 py-3 text-center border-l border-gray-100"><span class="bg-gray-100 text-gray-800 px-2 py-1 rounded text-xs font-bold">${p.qty}</span></td>
            <td class="px-6 py-3 text-center border-l border-gray-100 text-green-600 font-semibold">${formatDuration(p.dur)}</td>
            <td class="px-6 py-3 text-center bg-blue-50 text-blue-700 font-black">${p.avg}</td>
         </tr>`;
       });
    }
    document.getElementById('repProductTable').innerHTML = tbHtml;

    // Destroy old charts to prevent overlapping
    if (repDoughnutInstance) repDoughnutInstance.destroy();
    if (repTrendInstance) repTrendInstance.destroy();

    // Draw Doughnut Chart
    const ctxD = document.getElementById('repDoughnutChart').getContext('2d');
    repDoughnutInstance = new Chart(ctxD, {
      type: 'doughnut',
      data: {
        labels: ['الإنتاج', 'المهدر', 'الراحة'],
        datasets: [{
          data: [data.kpis.prod, data.kpis.waste, data.kpis.break],
          backgroundColor: ['#10b981', '#ef4444', '#fbbf24'],
          borderWidth: 0,
          hoverOffset: 4
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { font: { family: 'inherit', weight: 'bold' } } } }
      }
    });

    // Draw Trend Stacked Bar Chart
    const trendLabels = data.trend.map(t => t.date.substring(5)); // Show MM-DD
    const ctxT = document.getElementById('repTrendChart').getContext('2d');
    repTrendInstance = new Chart(ctxT, {
      type: 'bar',
      data: {
        labels: trendLabels,
        datasets: [
          { label: 'الإنتاج', data: data.trend.map(t => t.prod), backgroundColor: '#10b981' },
          { label: 'المهدر', data: data.trend.map(t => t.waste), backgroundColor: '#ef4444' },
          { label: 'وقت إضافي', data: data.trend.map(t => t.ot), backgroundColor: '#a855f7' }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { stacked: true, grid: { display: false } },
          y: { stacked: true, title: { display: true, text: 'الدقائق', font: {family: 'inherit'} } }
        },
        plugins: { legend: { position: 'top', labels: { font: { family: 'inherit', weight: 'bold' } } } }
      }
    });
  }

  // --- TDS Portal Scripts ---

var tdsDetails = {};

function initPortalTDS() {
  showLoading();
  google.script.run
    .withSuccessHandler(function(products) {
      hideLoading();
      const select = document.getElementById('tdsProductSelect');
      select.innerHTML = '<option value="">-- اختر المنتج --</option>';
      products.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        select.appendChild(opt);
      });
    })
    .withFailureHandler(error => { hideLoading(); alert(error.message); })
    .getTDSProducts();
    
  // Set today's date
  document.getElementById('tdsDate').valueAsDate = new Date();
}

function loadTDSDetails() {
  const product = document.getElementById('tdsProductSelect').value;
  if(!product) return;
  
  showLoading();
  google.script.run
    .withSuccessHandler(function(details) {
      hideLoading();
      tdsDetails = details;
      
      // Auto-calculate Expiry if Date is set
      calculateExpiry();
    })
    .withFailureHandler(error => { hideLoading(); alert(error.message); })
    .getTDSDetails(product);
}

function calculateExpiry() {
  const prodDateStr = document.getElementById('tdsDate').value;
  if (!prodDateStr || !tdsDetails.shelfLife) return;
  
  // Extract number from "24 Months" string
  const months = parseInt(tdsDetails.shelfLife);
  if(isNaN(months)) return;
  
  const prodDate = new Date(prodDateStr);
  const expDate = new Date(prodDate);
  expDate.setMonth(expDate.getMonth() + months);
  // Subtract 1 day for proper expiry
  expDate.setDate(expDate.getDate() - 1);
  
  document.getElementById('tdsExpDate').valueAsDate = expDate;
}

function generateGenericSpec() {
  // 1. Check if product is selected
  const product = document.getElementById('tdsProductSelect').value;
  if (!product) {
    alert("Please select a product first.");
    return;
  }

  // 2. Confirm
  if(!confirm("Generate a Generic Technical Specification (no batch results)?")) return;

  // 3. Show Loading
  showLoading();
  var loadingEl = document.getElementById('loadingText');
  if (loadingEl) loadingEl.textContent = "Generating Generic Spec...";

  // 4. Call Server
  google.script.run
    .withSuccessHandler(function(result) {
      hideLoading();
      if (loadingEl) loadingEl.textContent = "جاري التحميل...";

      // Show Success (Reuse the existing container)
      const container = document.getElementById('tdsFormCard');
      container.innerHTML = `
        <div class="success-msg" style="flex-direction:column; gap:15px; text-align:center;">
          <i class="fas fa-file-alt" style="font-size:3em; color: #64748b;"></i>
          <div>
            <h3>Generic Specification Generated!</h3>
            <div style="background:white; color:#333; padding:5px 10px; border-radius:4px; margin:10px auto; display:inline-block; font-family:monospace;">
              ${result.documentId}
            </div>
          </div>
          <a href="${result.url}" target="_blank" class="btn btn-primary" style="text-decoration:none; color:white;">
            <i class="fas fa-file-pdf"></i> Open PDF
          </a>
          <button onclick="resetTDSForm()" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Back
          </button>
        </div>
      `;
    })
    .withFailureHandler(function(error) {
      hideLoading();
      if (loadingEl) loadingEl.textContent = "جاري التحميل...";
      alert("Error: " + error.message);
    })
    .generateAndLogGenericTDS(product);
}

function generateTDS(event) {
  event.preventDefault();
  
  // 1. Confirm
  if(!confirm("Are you sure you want to generate and save this certificate?")) return;

  // 2. Gather Data
  const data = {
    productName: tdsDetails.product,
    batchNumber: document.getElementById('tdsBatch').value,
    prodDate: document.getElementById('tdsDate').value,
    expDate: document.getElementById('tdsExpDate').value,
    acidity: document.getElementById('tdsAcidity').value,
    oxidation: document.getElementById('tdsOxidation').value,
    ph: document.getElementById('tdspH').value
  };
  
  // 3. Show Loading (Safely)
  showLoading();
  var loadingEl = document.getElementById('loadingText');
  if (loadingEl) {
    loadingEl.textContent = "Generating PDF & Saving to Drive...";
  }
  
  // 4. Call Server
  google.script.run
    .withSuccessHandler(function(result) {
      hideLoading();
      
      // Reset loading text
      if (loadingEl) loadingEl.textContent = "جاري التحميل...";

      // Show Success Message with Link
      const container = document.getElementById('tdsFormCard');
      container.innerHTML = `
        <div class="success-msg" style="flex-direction:column; gap:15px; text-align:center;">
          <i class="fas fa-check-circle" style="font-size:3em;"></i>
          <div>
            <h3>Certificate Generated Successfully!</h3>
            <div style="background:white; color:#333; padding:5px 10px; border-radius:4px; margin:10px auto; display:inline-block; font-family:monospace;">
              ${result.documentId}
            </div>
          </div>
          <a href="${result.url}" target="_blank" class="btn btn-primary" style="text-decoration:none; color:white;">
            <i class="fas fa-file-pdf"></i> Open PDF Certificate
          </a>
          <button onclick="resetTDSForm()" class="btn btn-secondary">
            <i class="fas fa-plus"></i> Create Another
          </button>
        </div>
      `;
      
    })
    .withFailureHandler(function(error) {
      hideLoading();
      if (loadingEl) loadingEl.textContent = "جاري التحميل...";
      alert("Error: " + error.message);
    })
    .generateAndLogTDS(data);
}

function resetTDSForm() {
  // Reload the portal to reset state
  showPortal('TDS');
}

function printTDS() {
  window.print();
}

function resetTDS() {
  document.getElementById('tdsCertificate').style.display = 'none';
  document.getElementById('tdsFormCard').style.display = 'block';
  document.getElementById('tdsForm').reset();
}
</script>
